<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bayyin TV Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--ar:"Noto Sans Arabic",sans-serif;--en:"Noto Sans",sans-serif;--bg:#FAFAFA;--surface:#fff;--soft:#f5f5f5;--text:#111;--muted:#6d7175;--available:#00D979;--limited:#FFD21F;--unavailable:#FF4A4A;--expected:#4C8DFF;--shadow:0 1px 2px rgba(0,0,0,.035),0 16px 38px rgba(0,0,0,.08),0 36px 80px rgba(0,0,0,.04)}
[data-theme="dark"]{--bg:#1E2329;--surface:#232B32;--soft:#2B333B;--text:#F5F7F8;--muted:#C6CDD2;--shadow:0 1px 2px rgba(0,0,0,.18),0 18px 38px rgba(0,0,0,.24),0 42px 90px rgba(0,0,0,.20)}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--ar)}.en{font-family:var(--en);direction:ltr}.tv{width:100vw;height:100vh;padding:18px;display:grid;grid-template-rows:68px minmax(0,1fr);gap:18px}.top{display:grid;grid-template-columns:1fr 1.4fr;gap:16px;align-items:center}.time{display:flex;gap:12px;align-items:center}.pill,.dept,.theme{height:52px;border:0;border-radius:999px;background:linear-gradient(180deg,var(--surface),var(--soft));box-shadow:var(--shadow);color:var(--text);display:grid;place-items:center;font-family:var(--en);font-weight:800}.pill{min-width:120px;padding:0 18px;font-size:21px}.dept{height:68px;justify-self:end;width:min(650px,100%);font-family:var(--ar);font-size:30px}.theme{width:52px;cursor:pointer}.main{min-height:0;display:grid;grid-template-columns:minmax(0,55fr) minmax(0,45fr);gap:14px}.panel{min-height:0;background:var(--surface);border-radius:28px;box-shadow:var(--shadow);padding:18px;display:flex;flex-direction:column;overflow:hidden}.head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding-bottom:12px;margin-bottom:14px}.title{margin:0;font-size:28px;line-height:1.2}.sub{margin:4px 0 0;color:var(--muted);font-family:var(--en);font-size:13px}.page{min-width:72px;height:34px;border-radius:999px;display:grid;place-items:center;background:linear-gradient(180deg,var(--surface),var(--soft));box-shadow:inset 0 1px 0 rgba(255,255,255,.25);font-family:var(--en);font-weight:800;font-size:13px;color:var(--muted)}.list{height:100%;display:grid;grid-template-rows:repeat(5,minmax(0,1fr));gap:14px;transition:.52s cubic-bezier(.2,.8,.2,1)}.changing{opacity:0;transform:translateY(14px) scale(.992);filter:blur(3px)}.card{position:relative;isolation:isolate;overflow:hidden;direction:ltr;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));grid-template-areas:"meta info info icon";align-items:center;gap:16px;height:100%;min-height:0;padding:12px 18px;border-radius:18px;background:var(--surface);box-shadow:var(--shadow)}html[dir="ltr"] .card{grid-template-areas:"icon info info meta"}.card:before{content:"";position:absolute;inset:0;z-index:-1}.card[data-status="available"]:before{background:linear-gradient(270deg,rgba(0,217,121,.24),rgba(0,217,121,.12) 25%,rgba(0,217,121,.04) 55%,transparent 78%)}.card[data-status="limited"]:before{background:linear-gradient(270deg,rgba(255,210,31,.24),rgba(255,210,31,.12) 25%,rgba(255,210,31,.04) 55%,transparent 78%)}.card[data-status="unavailable"]:before{background:linear-gradient(270deg,rgba(255,74,74,.24),rgba(255,74,74,.12) 25%,rgba(255,74,74,.04) 55%,transparent 78%)}.card[data-status="expected"]:before{background:linear-gradient(270deg,rgba(76,141,255,.24),rgba(76,141,255,.12) 25%,rgba(76,141,255,.04) 55%,transparent 78%)}.icon{grid-area:icon;width:52px;height:52px;border-radius:50%;justify-self:center;display:grid;place-items:center;font-family:var(--en);font-size:28px;font-weight:800}.card[data-status="available"] .icon{color:var(--available)}.card[data-status="limited"] .icon{color:var(--limited)}.card[data-status="unavailable"] .icon{color:var(--unavailable)}.card[data-status="expected"] .icon{color:var(--expected)}.info{grid-area:info;min-width:0;direction:rtl;text-align:right}.name{margin:0;font-size:clamp(16px,1.15vw,21px);line-height:1.24;font-weight:800}.enline{margin:4px 0 0;color:var(--muted);font-family:var(--en);direction:ltr;text-align:left;font-size:clamp(12px,.82vw,14px);line-height:1.35}.meta{grid-area:meta;direction:ltr;text-align:end;font-family:var(--en);font-weight:800;color:var(--muted)}.meta strong{display:block;color:var(--text);font-size:15px}.empty{border-radius:18px;opacity:.22;background:linear-gradient(180deg,var(--surface),var(--soft));box-shadow:inset 0 1px 0 rgba(255,255,255,.25)}.empty-message{height:100%;border-radius:18px;display:grid;place-items:center;text-align:center;background:linear-gradient(180deg,var(--surface),var(--soft));box-shadow:var(--shadow);color:var(--muted);font-weight:700}.expiryHost{height:100%;position:relative;padding-top:26px;overflow:visible}.stack{height:100%;position:relative;perspective:1600px}.win{position:absolute;inset:0;transition:transform .42s cubic-bezier(.2,.8,.2,1),opacity .42s,filter .42s}.win[data-window="30"]{z-index:6;transform:translate3d(0,0,0) scale(1)}.win[data-window="60"]{z-index:4;transform:translate3d(-28px,-26px,-70px) scale(.982);opacity:.98;filter:saturate(.94)}.stack.show60 .win[data-window="60"]{z-index:7;transform:translate3d(0,0,0) scale(1);opacity:1;filter:none}.stack.show60 .win[data-window="30"]{z-index:4;transform:translate3d(28px,-26px,-70px) scale(.982);opacity:.98;filter:saturate(.94)}.tab{position:absolute;top:0;height:56px;width:214px;border:0;border-radius:22px 22px 0 0;display:grid;place-items:center;font-family:var(--ar);font-size:16px;font-weight:800;box-shadow:0 12px 24px rgba(0,0,0,.075),inset 0 1px 0 rgba(255,255,255,.45)}.win[data-window="30"] .tab{right:18px;color:#C33E35;background:linear-gradient(180deg,rgba(255,74,74,.34),rgba(255,74,74,.12),rgba(255,74,74,.035)),var(--surface)}.win[data-window="60"] .tab{right:244px;color:#8D780E;background:linear-gradient(180deg,rgba(255,210,31,.36),rgba(255,210,31,.13),rgba(255,210,31,.035)),var(--surface)}.body{position:absolute;inset:56px 0 0 0;border-radius:0 0 28px 28px;padding:18px;overflow:hidden;background:var(--surface);box-shadow:var(--shadow)}.win[data-window="30"] .body{background:linear-gradient(180deg,rgba(255,74,74,.12),rgba(255,74,74,0) 150px),var(--surface)}.win[data-window="60"] .body{background:linear-gradient(180deg,rgba(255,210,31,.12),rgba(255,210,31,0) 150px),var(--surface)}.status{font-family:var(--en);font-size:11px;color:var(--muted);margin-top:6px}
</style>
</head>
<body>
<main class="tv">
  <header class="top"><div class="time"><div class="pill" id="date">--/--/----</div><div class="pill" id="clock">--:--</div><button class="theme" id="theme">◐</button></div><div class="dept">Supply Department</div></header>
  <section class="main"><section class="panel"><header class="head"><div><h2 class="title">آخر التحديثات</h2><p class="sub">Latest Updates</p><div class="status" id="sync">Connecting…</div></div><div class="page" id="updatesPage">0 / 0</div></header><div class="list" id="updates"></div></section><section class="panel"><div class="expiryHost"><section class="stack" id="stack"><article class="win" data-window="60"><div class="tab">تنتهي خلال 60 يوم</div><div class="body"><div class="list" id="expiry60"></div></div></article><article class="win" data-window="30"><div class="tab">تنتهي خلال 30 يوم</div><div class="body"><div class="list" id="expiry30"></div></div></article></section></div></section></section>
</main>
<script>
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwpNmjwSdbmxsKMQz5rNbgOn463IZ4c2EOU7GO2rMkXVx0gXzV_hokd5GtGPkYPz1wjzA/exec';
const PAGE_SIZE=5, UPDATES_MS=120000, EXP30_MS=100000, EXP60_MS=60000;
let data={updatesToday:[],expiry30:[],expiry60:[]},uPage=0,expWin='30',p30=0,p60=0,expTimer=null;
function jsonp(){return new Promise((res,rej)=>{const cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*9999),s=document.createElement('script'),sep=APPS_SCRIPT_URL.includes('?')?'&':'?';window[cb]=d=>{delete window[cb];s.remove();res(d)};s.onerror=()=>{delete window[cb];s.remove();rej(new Error('JSONP failed'))};s.src=`${APPS_SCRIPT_URL}${sep}callback=${cb}&t=${Date.now()}`;document.body.appendChild(s)})}
function chunks(a){let p=[];for(let i=0;i<a.length;i+=PAGE_SIZE)p.push(a.slice(i,i+PAGE_SIZE));return p.length?p:[[]]}
function fill(html,n){return html+Array.from({length:Math.max(0,PAGE_SIZE-n)}).map(()=>'<div class="empty"></div>').join('')}
function icon(st){return st==='available'?'✓':st==='unavailable'?'×':st==='limited'?'!':'•'}
function card(x,expiry=false,status='expected'){const st=expiry?status:(x.status||'expected');return `<article class="card" data-status="${st}"><div class="icon">${icon(st)}</div><div class="info"><h3 class="name">${x.itemAr||''}</h3><p class="enline">${x.itemEn||''}</p></div><div class="meta"><strong>${expiry?(x.date||''):(x.time||'--:--')}</strong><span>${expiry?'Expiry':(x.date||'')}</span></div></article>`}
function renderUpdates(anim=false){const root=document.getElementById('updates'),pages=chunks(data.updatesToday||[]);if(uPage>=pages.length)uPage=0;const draw=()=>{const cur=pages[uPage];document.getElementById('updatesPage').textContent=cur.length?`${uPage+1} / ${pages.length}`:'0 / 0';root.innerHTML=cur.length?fill(cur.map(x=>card(x)).join(''),cur.length):fill('<div class="empty-message"><div>لا توجد تحديثات لهذا اليوم<br><span class="en">No updates for today</span></div></div>',1)};if(!anim){draw();return}root.classList.add('changing');setTimeout(()=>{draw();requestAnimationFrame(()=>root.classList.remove('changing'))},520)}
function rotateUpdates(){setInterval(()=>{const pages=chunks(data.updatesToday||[]);if(pages.length<=1)return;uPage=(uPage+1)%pages.length;renderUpdates(true)},UPDATES_MS)}
function renderExpiry(anim=false){const stack=document.getElementById('stack'),e30=document.getElementById('expiry30'),e60=document.getElementById('expiry60'),pages30=chunks(data.expiry30||[]),pages60=chunks(data.expiry60||[]);if(p30>=pages30.length)p30=0;if(p60>=pages60.length)p60=0;stack.classList.toggle('show60',expWin==='60');const draw=()=>{const c30=pages30[p30],c60=pages60[p60];e30.innerHTML=fill(c30.map(x=>card(x,true,'unavailable')).join(''),c30.length);e60.innerHTML=fill(c60.map(x=>card(x,true,'limited')).join(''),c60.length)};if(!anim){draw();return}const active=expWin==='60'?e60:e30;active.classList.add('changing');setTimeout(()=>{draw();requestAnimationFrame(()=>active.classList.remove('changing'))},520)}
function scheduleExpiry(){clearTimeout(expTimer);const dur=expWin==='30'?EXP30_MS:EXP60_MS;expTimer=setTimeout(()=>{const pages30=chunks(data.expiry30||[]),pages60=chunks(data.expiry60||[]);if(expWin==='30'){p30++;if(p30>=pages30.length){p30=0;expWin='60';p60=0}}else{p60++;if(p60>=pages60.length){p60=0;expWin='30';p30=0}}renderExpiry(true);scheduleExpiry()},dur)}
async function sync(){try{const d=await jsonp();if(!d||!d.ok)throw new Error(d&&d.error?d.error:'Bad data');data=d;uPage=0;renderUpdates(true);renderExpiry(false);document.getElementById('sync').textContent='Synced '+new Intl.DateTimeFormat('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Asia/Riyadh'}).format(new Date())}catch(e){document.getElementById('sync').textContent='Sync failed: '+e.message;console.warn(e)}}
function clock(){const now=new Date();document.getElementById('clock').textContent=new Intl.DateTimeFormat('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Asia/Riyadh'}).format(now);document.getElementById('date').textContent=new Intl.DateTimeFormat('en-GB',{day:'2-digit',month:'2-digit',year:'numeric',timeZone:'Asia/Riyadh'}).format(now)}
async function wake(){try{if('wakeLock'in navigator)await navigator.wakeLock.request('screen')}catch(e){}}
document.getElementById('theme').onclick=()=>document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark';clock();setInterval(clock,60000);sync();setInterval(sync,20000);rotateUpdates();renderExpiry();scheduleExpiry();wake();document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')wake()});
</script>
</body></html>
