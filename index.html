<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bayyin TV Display — بيّن شاشة العرض</title>

<!-- LINE 001: Fonts — Arabic = Noto Sans Arabic / English = Noto Sans -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
/* =========================================================
   BAYYIN TV DISPLAY — EDITABLE SINGLE HTML FILE
   طريقة التعديل:
   - البيانات: ابحثي عن LINE 300
   - ألوان الثيم: LINE 020
   - تقسيم شاشة التلفاز: LINE 080
   - كروت آخر التحديثات: LINE 150
   - نافذة تواريخ الانتهاء: LINE 210
   ========================================================= */

/* LINE 020: Design tokens */
:root {
  --font-ar: "Noto Sans Arabic", sans-serif;
  --font-en: "Noto Sans", sans-serif;
  --bg: #FAFAFA;
  --surface: #FFFFFF;
  --surface-soft: #F6F6F6;
  --border: #E6E6E6;
  --text: #111111;
  --muted: #6F6F6F;
  --available: #00D979;
  --limited: #FFD21F;
  --unavailable: #FF4A4A;
  --expected: #4C8DFF;
  --shadow-card: 0px 1px 2px rgba(0,0,0,0.035), 0px 12px 28px rgba(0,0,0,0.075), 0px 30px 70px rgba(0,0,0,0.035);
  --ease: cubic-bezier(0.2,0,0,1);
}

[data-theme="dark"] {
  --bg: #1E2329;
  --surface: #232B32;
  --surface-soft: #2B333B;
  --border: rgba(255,255,255,0.055);
  --text: #F5F7F8;
  --muted: #C6CDD2;
  --shadow-card: 0px 1px 2px rgba(0,0,0,0.18), 0px 18px 38px rgba(0,0,0,0.24), 0px 42px 90px rgba(0,0,0,0.20);
}

/* LINE 050: Base */
* { box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ar);
}
.en, [lang="en"] { font-family: var(--font-en); direction: ltr; }

/* LINE 080: TV layout grid */
.tv-screen {
  width: 100vw;
  height: 100vh;
  padding: 18px;
  display: grid;
  grid-template-rows: 68px minmax(0, 1fr);
  gap: 18px;
  background: var(--bg);
}

/* LINE 090: Top bar layout */
.tv-top {
  display: grid;
  grid-template-columns: minmax(280px, 0.9fr) minmax(420px, 1.7fr);
  gap: 18px;
  align-items: center;
}
.time-group { display: flex; gap: 12px; align-items: center; justify-self: start; }
.date-pill, .time-pill, .department-pill {
  height: 52px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: linear-gradient(180deg, var(--surface), var(--surface-soft));
  box-shadow: var(--shadow-card);
  display: grid;
  place-items: center;
  font-weight: 800;
}
.date-pill { min-width: 168px; padding: 0 22px; font-family: var(--font-en); font-size: 21px; }
.time-pill { min-width: 108px; padding: 0 18px; font-family: var(--font-en); font-size: 22px; }
.department-pill { justify-self: end; width: min(660px, 100%); height: 68px; padding: 0 28px; font-size: 30px; text-align: center; }

/* LINE 120: Main split — Latest Updates large, Expiry Dates smaller */
.tv-main {
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(0, 1.7fr) minmax(360px, 1fr);
  gap: 14px;
  overflow: hidden;
}
.panel {
  min-height: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 28px;
  box-shadow: var(--shadow-card);
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow: hidden;
}
.panel-head { flex: 0 0 auto; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.panel-title { margin: 0; font-size: 28px; line-height: 1.25; font-weight: 800; }
.panel-sub { margin: 4px 0 0; color: var(--muted); font-family: var(--font-en); font-size: 13px; }
.scroll-area { flex: 1 1 auto; min-height: 0; overflow-y: auto; overflow-x: hidden; padding-inline-end: 4px; }
.scroll-area::-webkit-scrollbar { width: 8px; }
.scroll-area::-webkit-scrollbar-thumb { background: rgba(150,150,150,0.35); border-radius: 999px; }

/* LINE 150: Medication notification card — applies to Latest Updates */
.update-list { display: grid; gap: 16px; }
.notice-card {
  min-height: 96px;
  position: relative;
  isolation: isolate;
  overflow: hidden;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  grid-template-areas: "meta breath info icon";
  gap: 16px;
  align-items: center;
  padding: 16px 20px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: var(--surface);
  box-shadow: var(--shadow-card);
  transition: transform 200ms var(--ease), box-shadow 200ms var(--ease);
}
.notice-card:hover { transform: translateY(-2px); }
.notice-card::before { content: ""; position: absolute; inset: 0; z-index: -1; pointer-events: none; }

/* LINE 180: Gradient fade direction for Arabic RTL */
html[dir="rtl"] .notice-card[data-status="available"]::before { background: linear-gradient(270deg, rgba(0,217,121,.20) 0%, rgba(0,217,121,.11) 23%, rgba(0,217,121,.03) 52%, transparent 76%); }
html[dir="rtl"] .notice-card[data-status="limited"]::before { background: linear-gradient(270deg, rgba(255,210,31,.20) 0%, rgba(255,210,31,.11) 23%, rgba(255,210,31,.03) 52%, transparent 76%); }
html[dir="rtl"] .notice-card[data-status="unavailable"]::before { background: linear-gradient(270deg, rgba(255,74,74,.20) 0%, rgba(255,74,74,.11) 23%, rgba(255,74,74,.03) 52%, transparent 76%); }
html[dir="rtl"] .notice-card[data-status="expected"]::before { background: linear-gradient(270deg, rgba(76,141,255,.20) 0%, rgba(76,141,255,.11) 23%, rgba(76,141,255,.03) 52%, transparent 76%); }

/* LINE 195: English LTR layout + gradient */
html[dir="ltr"] .notice-card { grid-template-areas: "icon info breath meta"; }
html[dir="ltr"] .notice-card[data-status="available"]::before { background: linear-gradient(90deg, rgba(0,217,121,.20) 0%, rgba(0,217,121,.11) 23%, rgba(0,217,121,.03) 52%, transparent 76%); }
html[dir="ltr"] .notice-card[data-status="limited"]::before { background: linear-gradient(90deg, rgba(255,210,31,.20) 0%, rgba(255,210,31,.11) 23%, rgba(255,210,31,.03) 52%, transparent 76%); }
html[dir="ltr"] .notice-card[data-status="unavailable"]::before { background: linear-gradient(90deg, rgba(255,74,74,.20) 0%, rgba(255,74,74,.11) 23%, rgba(255,74,74,.03) 52%, transparent 76%); }
html[dir="ltr"] .notice-card[data-status="expected"]::before { background: linear-gradient(90deg, rgba(76,141,255,.20) 0%, rgba(76,141,255,.11) 23%, rgba(76,141,255,.03) 52%, transparent 76%); }

.notice-icon { grid-area: icon; width: 54px; height: 54px; border-radius: 50%; display: grid; place-items: center; justify-self: center; position: relative; color: var(--available); }
.notice-icon::before { content: ""; position: absolute; inset: -7px; border-radius: 50%; background: currentColor; opacity: 0.16; }
.notice-icon svg { width: 32px; height: 32px; stroke-width: 2.7; position: relative; z-index: 1; }
.notice-card[data-status="available"] .notice-icon { color: var(--available); }
.notice-card[data-status="limited"] .notice-icon { color: var(--limited); }
.notice-card[data-status="unavailable"] .notice-icon { color: var(--unavailable); }
.notice-card[data-status="expected"] .notice-icon { color: var(--expected); }
.notice-info { grid-area: info; min-width: 0; }
.notice-title { margin: 0; font-size: 22px; line-height: 1.25; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.notice-sub { margin: 4px 0 0; color: var(--muted); font-size: 15px; line-height: 1.45; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.notice-meta { grid-area: meta; justify-self: end; text-align: end; direction: ltr; font-family: var(--font-en); color: var(--muted); display: grid; gap: 2px; }
.notice-meta strong { color: var(--text); font-size: 15px; font-weight: 800; }
.notice-meta span { font-size: 13px; font-weight: 600; }

/* LINE 210: Expiry browser stack */
.expiry-host { flex: 1 1 auto; min-height: 0; position: relative; overflow: visible; padding-top: 26px; }
.expiry-stack { width: 100%; height: calc(100% - 6px); position: relative; perspective: 1600px; overflow: visible; }
.expiry-window { position: absolute; inset: 0; width: 100%; height: 100%; transform-origin: 72% 16%; transition: transform 420ms cubic-bezier(.2,.8,.2,1), opacity 420ms ease, filter 420ms ease; }
.expiry-window[data-window="30"] { z-index: 6; transform: translate3d(0,0,0) scale(1); }
.expiry-window[data-window="60"] { z-index: 4; transform: translate3d(-28px,-26px,-70px) scale(.982); opacity: .98; filter: saturate(.94) brightness(.985); }
.expiry-stack.show-60 .expiry-window[data-window="60"] { z-index: 7; transform: translate3d(0,0,0) scale(1); opacity: 1; filter: none; }
.expiry-stack.show-60 .expiry-window[data-window="30"] { z-index: 4; transform: translate3d(28px,-26px,-70px) scale(.982); opacity: .98; filter: saturate(.94) brightness(.985); }
.expiry-tab { position: absolute; top: 0; height: 56px; width: 214px; border-radius: 22px 22px 0 0; border: 2px solid var(--border); border-bottom: 0; display: grid; place-items: center; font-size: 16px; font-weight: 800; cursor: pointer; user-select: none; box-shadow: 0 10px 18px rgba(0,0,0,.055), inset 0 1px 0 rgba(255,255,255,.88); }
.expiry-window[data-window="30"] .expiry-tab { right: 18px; background: linear-gradient(180deg, #FFFFFF 0%, #FFE7E0 54%, #FFF2EE 100%); border-color: #E3A79B; color: #C33E35; }
.expiry-window[data-window="60"] .expiry-tab { right: 244px; background: linear-gradient(180deg, #FFFFFF 0%, #FFE9A8 54%, #FFF6D8 100%); border-color: #DDBB55; color: #9A6D00; }
.expiry-body { position: absolute; inset: 56px 0 0 0; border-radius: 0 0 28px 28px; border: 2px solid var(--border); border-top: 0; padding: 22px 18px 20px; overflow: hidden; background: var(--surface); box-shadow: var(--shadow-card); }
.expiry-window[data-window="30"] .expiry-body { background: linear-gradient(180deg, #FFF2EE 0, var(--surface) 84px, var(--surface) 100%); border-color: #E3A79B; }
.expiry-window[data-window="60"] .expiry-body { background: linear-gradient(180deg, #FFF6D8 0, var(--surface) 84px, var(--surface) 100%); border-color: #DDBB55; }
.expiry-list { height: 100%; overflow-y: auto; display: grid; gap: 12px; padding-inline-end: 6px; }
.expiry-item { min-height: 78px; display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); grid-template-areas: "date breath info icon"; gap: 12px; align-items: center; padding: 12px 14px; border-radius: 18px; border: 1px solid var(--border); background: linear-gradient(180deg, var(--surface), var(--surface-soft)); box-shadow: var(--shadow-card); }
.expiry-icon { grid-area: icon; justify-self: center; color: #C33E35; }
.expiry-window[data-window="60"] .expiry-icon { color: #9A6D00; }
.expiry-info { grid-area: info; min-width: 0; }
.expiry-date { grid-area: date; justify-self: end; font-family: var(--font-en); font-weight: 800; color: var(--muted); }

/* LINE 260: Responsive */
@media (max-width: 1024px) {
  html, body { overflow: auto; }
  .tv-screen { height: auto; min-height: 100vh; overflow: visible; }
  .tv-top, .tv-main { grid-template-columns: 1fr; }
  .department-pill { justify-self: stretch; width: 100%; }
  .panel { min-height: 480px; }
  .notice-card, .expiry-item { min-width: 760px; }
  .scroll-area, .expiry-list { overflow: auto; }
}

/* =========================================================
   PATCH: CORRECT QUARTER LOGIC + FADING DIRECTION
   Arabic RTL visual order from RIGHT → LEFT:
   Q1 icon | Q2 item info | Q3 breathing | Q4 time/date

   English LTR visual order from LEFT → RIGHT:
   Q1 icon | Q2 item info | Q3 breathing | Q4 time/date

   Important:
   The card grid itself is forced to LTR so the visual quarters
   do not get flipped by the page direction.
   ========================================================= */

/* Arabic page: visual right-to-left quarters.
   LTR grid coordinates become:
   left: meta, then breath, then info, right: icon */
html[dir="rtl"] .notice-card {
  direction: ltr !important;
  grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
  grid-template-areas: "meta breath info icon" !important;
}

html[dir="rtl"] .expiry-item {
  direction: ltr !important;
  grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
  grid-template-areas: "date breath info icon" !important;
}

/* English page: visual left-to-right quarters */
html[dir="ltr"] .notice-card {
  direction: ltr !important;
  grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
  grid-template-areas: "icon info breath meta" !important;
}

html[dir="ltr"] .expiry-item {
  direction: ltr !important;
  grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
  grid-template-areas: "icon info breath date" !important;
}

/* Keep Arabic text readable inside Q2 */
html[dir="rtl"] .notice-info,
html[dir="rtl"] .expiry-info {
  direction: rtl !important;
  text-align: right !important;
}

/* Keep English text readable inside Q2 */
html[dir="ltr"] .notice-info,
html[dir="ltr"] .expiry-info {
  direction: ltr !important;
  text-align: left !important;
}

/* Time/date is always numeric LTR */
.notice-meta,
.expiry-date {
  direction: ltr !important;
}

/* Arabic: fading starts from the RIGHT, strongest at Q1 icon,
   then fades across Q2 and Q3, and becomes transparent before Q4 */
html[dir="rtl"] .notice-card[data-status="available"]::before {
  background: linear-gradient(270deg, rgba(0,217,121,.24) 0%, rgba(0,217,121,.14) 23%, rgba(0,217,121,.045) 52%, transparent 76%) !important;
}
html[dir="rtl"] .notice-card[data-status="limited"]::before {
  background: linear-gradient(270deg, rgba(255,210,31,.24) 0%, rgba(255,210,31,.14) 23%, rgba(255,210,31,.045) 52%, transparent 76%) !important;
}
html[dir="rtl"] .notice-card[data-status="unavailable"]::before {
  background: linear-gradient(270deg, rgba(255,74,74,.24) 0%, rgba(255,74,74,.14) 23%, rgba(255,74,74,.045) 52%, transparent 76%) !important;
}
html[dir="rtl"] .notice-card[data-status="expected"]::before {
  background: linear-gradient(270deg, rgba(76,141,255,.24) 0%, rgba(76,141,255,.14) 23%, rgba(76,141,255,.045) 52%, transparent 76%) !important;
}

/* English: fading starts from the LEFT, strongest at Q1 icon,
   then fades across Q2 and Q3, and becomes transparent before Q4 */
html[dir="ltr"] .notice-card[data-status="available"]::before {
  background: linear-gradient(90deg, rgba(0,217,121,.24) 0%, rgba(0,217,121,.14) 23%, rgba(0,217,121,.045) 52%, transparent 76%) !important;
}
html[dir="ltr"] .notice-card[data-status="limited"]::before {
  background: linear-gradient(90deg, rgba(255,210,31,.24) 0%, rgba(255,210,31,.14) 23%, rgba(255,210,31,.045) 52%, transparent 76%) !important;
}
html[dir="ltr"] .notice-card[data-status="unavailable"]::before {
  background: linear-gradient(90deg, rgba(255,74,74,.24) 0%, rgba(255,74,74,.14) 23%, rgba(255,74,74,.045) 52%, transparent 76%) !important;
}
html[dir="ltr"] .notice-card[data-status="expected"]::before {
  background: linear-gradient(90deg, rgba(76,141,255,.24) 0%, rgba(76,141,255,.14) 23%, rgba(76,141,255,.045) 52%, transparent 76%) !important;
}

/* Apply same fading behavior to expiry rows */
html[dir="rtl"] .expiry-item[data-status="unavailable"]::before,
html[dir="rtl"] .expiry-item[data-status="limited"]::before {
  background: linear-gradient(270deg, rgba(255,74,74,.20) 0%, rgba(255,74,74,.11) 23%, rgba(255,74,74,.035) 52%, transparent 76%) !important;
}

html[dir="ltr"] .expiry-item[data-status="unavailable"]::before,
html[dir="ltr"] .expiry-item[data-status="limited"]::before {
  background: linear-gradient(90deg, rgba(255,74,74,.20) 0%, rgba(255,74,74,.11) 23%, rgba(255,74,74,.035) 52%, transparent 76%) !important;
}


/* PATCH — Theme toggle button */
.theme-toggle {
  width: 52px;
  height: 52px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: linear-gradient(180deg, var(--surface), var(--surface-soft));
  color: var(--text);
  box-shadow: var(--shadow-card);
  display: grid;
  place-items: center;
  cursor: pointer;
  transition: transform 200ms var(--ease), box-shadow 200ms var(--ease), background 200ms var(--ease);
}

.theme-toggle:hover {
  transform: translateY(-2px);
}

.theme-toggle:active {
  transform: translateY(1px);
}

.theme-toggle svg {
  width: 22px;
  height: 22px;
  stroke-width: 2.2;
}

.theme-control {
  display: flex;
  align-items: center;
  gap: 12px;
}


/* PATCH — Full medication data display for TV pharmacists
   No truncation. Names, dose, dosage form, code, and notes can wrap fully.
   Panels keep internal scroll if rows become taller.
*/
.notice-card,
.expiry-item {
  min-height: 110px !important;
  height: auto !important;
  align-items: center !important;
}

.notice-info,
.expiry-info {
  min-width: 0 !important;
  align-self: center !important;
}

.notice-title,
.notice-sub,
.expiry-info .notice-title,
.expiry-info .notice-sub {
  white-space: normal !important;
  overflow: visible !important;
  text-overflow: clip !important;
  max-width: 100% !important;
}

.notice-title {
  font-size: 21px !important;
  line-height: 1.38 !important;
}

.notice-sub {
  font-size: 14px !important;
  line-height: 1.55 !important;
  margin-top: 5px !important;
}

.update-list,
.expiry-list {
  align-content: start !important;
}

.scroll-area,
.expiry-list {
  overscroll-behavior: contain !important;
}

/* Keep date/time compact while item data wraps */
.notice-meta,
.expiry-date {
  align-self: center !important;
  white-space: nowrap !important;
}


/* PATCH — Item info spans Q2 + Q3
   Arabic RTL visual order from RIGHT → LEFT:
   Q1 icon | Q2 + Q3 item information | Q4 time/date

   English LTR visual order from LEFT → RIGHT:
   Q1 icon | Q2 + Q3 item information | Q4 time/date
*/
html[dir="rtl"] .notice-card {
  direction: ltr !important;
  grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
  grid-template-areas: "meta info info icon" !important;
}

html[dir="rtl"] .expiry-item {
  direction: ltr !important;
  grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
  grid-template-areas: "date info info icon" !important;
}

html[dir="ltr"] .notice-card {
  direction: ltr !important;
  grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
  grid-template-areas: "icon info info meta" !important;
}

html[dir="ltr"] .expiry-item {
  direction: ltr !important;
  grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
  grid-template-areas: "icon info info date" !important;
}

/* Give the expanded info area more readable spacing */
.notice-info,
.expiry-info {
  padding-inline: 4px !important;
}


/* PATCH — Main TV panel ratio
   Latest Updates = 55%
   Expiry Dates   = 45%
*/
.tv-main {
  grid-template-columns: minmax(0, 55fr) minmax(0, 45fr) !important;
}


/* PATCH — Expiry window heads match Bayyin fading logic
   Window tabs: vertical fade from TOP → BOTTOM.
   Removed harsh surrounding borders from expiry box/window/items.
*/
.expiry-panel,
.expiry-tab,
.expiry-body,
.expiry-item {
  border: 0 !important;
}

.expiry-panel {
  background: var(--surface) !important;
  box-shadow: var(--shadow-card) !important;
}

/* Browser window heads without ugly outline */
.expiry-tab {
  overflow: hidden !important;
  border: 0 !important;
  box-shadow:
    0 12px 24px rgba(0,0,0,.075),
    inset 0 1px 0 rgba(255,255,255,.70) !important;
}

/* 30-day head: red fade from top to bottom */
.expiry-window[data-window="30"] .expiry-tab {
  background:
    linear-gradient(
      180deg,
      rgba(255,74,74,.34) 0%,
      rgba(255,74,74,.18) 42%,
      rgba(255,74,74,.055) 100%
    ),
    var(--surface) !important;
  color: #C33E35 !important;
}

/* 60-day head: yellow fade from top to bottom */
.expiry-window[data-window="60"] .expiry-tab {
  background:
    linear-gradient(
      180deg,
      rgba(255,210,31,.36) 0%,
      rgba(255,210,31,.19) 42%,
      rgba(255,210,31,.055) 100%
    ),
    var(--surface) !important;
  color: #8D780E !important;
}

/* Window pages: no outline, only depth */
.expiry-body {
  border: 0 !important;
  box-shadow:
    0 24px 56px rgba(0,0,0,.105),
    0 8px 20px rgba(0,0,0,.055),
    inset 0 1px 0 rgba(255,255,255,.50) !important;
}

/* 30-day page background: subtle top fading surface */
.expiry-window[data-window="30"] .expiry-body {
  background:
    linear-gradient(
      180deg,
      rgba(255,74,74,.16) 0%,
      rgba(255,74,74,.055) 70px,
      rgba(255,74,74,0) 140px
    ),
    var(--surface) !important;
}

/* 60-day page background: subtle top fading surface */
.expiry-window[data-window="60"] .expiry-body {
  background:
    linear-gradient(
      180deg,
      rgba(255,210,31,.17) 0%,
      rgba(255,210,31,.06) 70px,
      rgba(255,210,31,0) 140px
    ),
    var(--surface) !important;
}

/* Expiry rows: no hard border, only soft depth */
.expiry-item {
  border: 0 !important;
  box-shadow:
    0 1px 2px rgba(0,0,0,.035),
    0 10px 24px rgba(0,0,0,.065),
    inset 0 1px 0 rgba(255,255,255,.55) !important;
}

/* Dark theme: same idea, stronger but clean */
[data-theme="dark"] .expiry-window[data-window="30"] .expiry-tab {
  background:
    linear-gradient(
      180deg,

/* LINE 360: Change icons here if needed */
const STATUS_ICON = { available: "circle-check", limited: "circle-alert", unavailable: "circle-x", expected: "clock" };

/* LINE 370: Render latest updates */
const UPDATES_PER_PAGE = 5;
const UPDATE_PAGE_DURATION_MS = 120000;
let updatePageIndex = 0;
let updateRotationTimer = null;

function updateSortValue(item) {
  if (item.timestamp) return new Date(item.timestamp).getTime() || 0;
  const year = new Date().getFullYear();
  return new Date(`${item.date} ${year} ${item.time}`).getTime() || 0;
}


function bayyinRiyadhDayKey(dateValue) {
  const d = dateValue instanceof Date ? dateValue : new Date(dateValue);

  if (isNaN(d)) return "";

  return new Intl.DateTimeFormat("en-CA", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    timeZone: "Asia/Riyadh"
  }).format(d);
}

function updateDateValue(item) {
  if (item.timestamp) return new Date(item.timestamp);

  const year = new Date().getFullYear();
  const fallback = new Date(`${item.date} ${year} ${item.time}`);

  return isNaN(fallback) ? new Date(0) : fallback;
}

function isTodayUpdate(item) {
  return bayyinRiyadhDayKey(updateDateValue(item)) === bayyinRiyadhDayKey(new Date());
}

function getLatestUpdates() {
  const latest = new Map();

  BAYYIN_DATA.updates
    .filter(isTodayUpdate)
    .forEach(item => {
      const key = item.code || item.itemAr || item.itemEn;
      const old = latest.get(key);

      if (!old || updateSortValue(item) > updateSortValue(old)) {
        latest.set(key, item);
      }
    });

  return [...latest.values()].sort((a, b) => updateSortValue(b) - updateSortValue(a));
}

function getUpdatePages() {
  const rows = getLatestUpdates();
  const pages = [];

  for (let i = 0; i < rows.length; i += UPDATES_PER_PAGE) {
    pages.push(rows.slice(i, i + UPDATES_PER_PAGE));
  }

  return pages.length ? pages : [[]];
}

function renderUpdatesPage(animate = false) {
  const root = document.getElementById("updatesList");
  const pill = document.getElementById("updatePagePill");
  const pages = getUpdatePages();

  if (updatePageIndex >= pages.length) updatePageIndex = 0;

  const draw = () => {
    const current = pages[updatePageIndex];

    if (!current.length) {
      root.innerHTML = `
        <div class="today-empty-card">
          <div>
            <strong>لا توجد تحديثات لهذا اليوم</strong>
            <span>No updates for today</span>
          </div>
        </div>
      `;
      if (pill) pill.textContent = "0 / 0";
      return;
    }

    root.innerHTML = current.map(item => `
      <article class="notice-card" data-status="${item.status}">
        <div class="notice-icon">
          <i data-lucide="${STATUS_ICON[item.status]}"></i>
        </div>

        <div class="notice-info">
          <h3 class="notice-title">${item.itemAr}</h3>
          <p class="notice-sub en">${item.itemEn}</p>
        </div>

        <div class="notice-meta">
          <strong>${item.time}</strong>
          <span>${item.date}</span>
        </div>
      </article>
    `).join("");

    if (pill) pill.textContent = `${updatePageIndex + 1} / ${pages.length}`;
    if (window.lucide) lucide.createIcons();
  };

  if (!animate) {
    draw();
    return;
  }

  root.classList.add("page-changing");

  window.setTimeout(() => {
    draw();
    requestAnimationFrame(() => root.classList.remove("page-changing"));
  }, 520);
}

function renderUpdates() {
  updatePageIndex = 0;
  renderUpdatesPage(false);
}

function startUpdateRotation() {
  if (updateRotationTimer) clearInterval(updateRotationTimer);

  updateRotationTimer = setInterval(() => {
    const pages = getUpdatePages();
    if (pages.length <= 1) return;

    updatePageIndex = (updatePageIndex + 1) % pages.length;
    renderUpdatesPage(true);
  }, UPDATE_PAGE_DURATION_MS);
}

/* Use this when a medication status changes live:
   - removes the old update for the same code
   - inserts the newest status
   - returns the TV to page 1 immediately
*/
function upsertUpdate(newUpdate) {
  const key = newUpdate.code || newUpdate.itemAr || newUpdate.itemEn;

  BAYYIN_DATA.updates = BAYYIN_DATA.updates.filter(item =>
    (item.code || item.itemAr || item.itemEn) !== key
  );

  BAYYIN_DATA.updates.unshift(newUpdate);
  updatePageIndex = 0;
  renderUpdatesPage(true);
}

/* =========================================================
   OFFICIAL GOOGLE SHEET DATABASE SYNC
   Database:
   - mai_formulary  => Latest Updates only
   - expiration     => Expiry Dates box only

   Important:
   The Google Sheet must be shared as: Anyone with the link can view.
   ========================================================= */

const OFFICIAL_SHEET_ID = "1pIimqyE7qMTf4ZWD3L045WpEJ5PfaUMA52aPf65b0Ec";
const OFFICIAL_FORMULARY_SHEET = "Main_Formula";
const OFFICIAL_EXPIRATION_SHEET = "expiration";
const OFFICIAL_SYNC_EVERY_MS = 20000;
const OFFICIAL_FORMULARY_SNAPSHOT_KEY = "bayyin_main_formula_exact_columns_v1";

function bayyinCleanKey(value) {
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/\s+/g, "_")
    .replace(/[^\u0600-\u06FFa-z0-9_]/g, "");
}

function bayyinPick(row, names) {
  const normalized = {};
  Object.keys(row).forEach(key => normalized[bayyinCleanKey(key)] = row[key]);

  for (const name of names) {
    const value = normalized[bayyinCleanKey(name)];
    if (value !== undefined && value !== null && String(value).trim() !== "") return String(value).trim();
  }

  return "";
}


function bayyinLooksLikeDose(value) {
  const text = String(value || "").trim().toLowerCase();
  if (!text) return false;

  return (
    /^\d+(\.\d+)?\s*(%|mg|mcg|microgram|g|gram|ml|iu|unit|units|mmol|meq|million|billion)\b/i.test(text) ||
    /^\d+(\.\d+)?\s*\/\s*\d+(\.\d+)?/.test(text) ||
    /^\d+(\.\d+)?%$/.test(text)
  );
}

function bayyinLooksLikeStatus(value) {
  const text = String(value || "").trim().toLowerCase();
  return (
    text.includes("available") ||
    text.includes("unavailable") ||
    text.includes("limited") ||
    text.includes("expected") ||
    text.includes("متوفر") ||
    text.includes("غير") ||
    text.includes("محدود")
  );
}

function bayyinLooksLikeFormOnly(value) {
  const text = String(value || "").trim().toLowerCase();
  return /^(tablet|tab|capsule|cap|syrup|cream|ointment|gel|solution|injection|ampoule|vial|drops|inhaler|spray|قرص|كبسولة|شراب|كريم|مرهم|جل|محلول|حقن|قطرة|بخاخ)$/.test(text);
}

function bayyinPickName(row, names) {
  const normalized = {};
  Object.keys(row).forEach(key => normalized[bayyinCleanKey(key)] = row[key]);

  for (const name of names) {
    const value = normalized[bayyinCleanKey(name)];
    const text = String(value || "").trim();

    if (!text) continue;
    if (bayyinLooksLikeDose(text)) continue;
    if (bayyinLooksLikeStatus(text)) continue;
    if (bayyinLooksLikeFormOnly(text)) continue;
    if (bayyinParseSheetDate(text)) continue;

    return text;
  }

  return "";
}

function bayyinBestNameValue(row) {
  const values = Object.values(row).map(value => String(value || "").trim());

  const candidates = values.filter(text => {
    if (!text) return false;
    if (text.length < 3) return false;
    if (bayyinLooksLikeDose(text)) return false;
    if (bayyinLooksLikeStatus(text)) return false;
    if (bayyinLooksLikeFormOnly(text)) return false;
    if (bayyinParseSheetDate(text)) return false;
    if (/^\d+(\.\d+)?$/.test(text)) return false;
    return /[a-zA-Z\u0600-\u06FF]/.test(text);
  });

  return candidates[0] || "";
}

function bayyinPickStrength(row) {
  const strength = bayyinPick(row, [
    "strength", "strengths", "dose", "dosage", "concentration", "potency",
    "تركيز", "التركيز", "الجرعة", "القوة", "جرعة", "dose_strength"
  ]);

  if (strength) return strength;

  for (const value of Object.values(row)) {
    const text = String(value || "").trim();
    if (bayyinLooksLikeDose(text)) return text;
  }

  return "";
}

function bayyinNormalizeStatus(value) {
  const s = String(value || "").trim().toLowerCase();

  if (!s) return "expected";
  if (s.includes("غير") || s.includes("unavailable") || s.includes("not available") || s.includes("out of stock") || s.includes("نفد")) return "unavailable";
  if (s.includes("محدود") || s.includes("limited") || s.includes("low") || s.includes("قليل")) return "limited";
  if (s.includes("قريب") || s.includes("expected") || s.includes("soon") || s.includes("ordered") || s.includes("طلب")) return "expected";
  if (s.includes("متوفر") || s.includes("available") || s.includes("in stock")) return "available";

  return "expected";
}

function bayyinParseSheetDate(value) {
  if (!value) return null;

  if (value instanceof Date) return value;

  const text = String(value).trim();
  if (!text) return null;

  /* Google Visualization sometimes returns dates like: Date(2026,5,30)
     Month is zero-based in this format. */
  const gviz = text.match(/^Date\((\d{4}),\s*(\d{1,2}),\s*(\d{1,2})/);
  if (gviz) {
    const d = new Date(Number(gviz[1]), Number(gviz[2]), Number(gviz[3]));
    return isNaN(d) ? null : d;
  }

  if (/^\d{4}-\d{1,2}-\d{1,2}/.test(text)) {
    const d = new Date(text);
    return isNaN(d) ? null : d;
  }

  if (/^\d{1,2}[/-]\d{1,2}[/-]\d{2,4}$/.test(text)) {
    const parts = text.split(/[/-]/).map(Number);
    const day = parts[0];
    const month = parts[1] - 1;
    const year = parts[2] < 100 ? 2000 + parts[2] : parts[2];
    const d = new Date(year, month, day);
    return isNaN(d) ? null : d;
  }

  const parsed = new Date(text);
  return isNaN(parsed) ? null : parsed;
}

function bayyinFormatUpdateDate(timestamp) {
  const d = timestamp ? new Date(timestamp) : new Date();

  return {
    time: new Intl.DateTimeFormat("en-GB", {
      hour: "2-digit",
      minute: "2-digit",
      hour12: false,
      timeZone: "Asia/Riyadh"
    }).format(d),
    date: new Intl.DateTimeFormat("en-GB", {
      day: "2-digit",
      month: "short",
      timeZone: "Asia/Riyadh"
    }).format(d),
    timestamp: d.toISOString()
  };
}

function bayyinFormatExpiryDate(date) {
  return new Intl.DateTimeFormat("en-GB", {
    day: "2-digit",
    month: "short",
    year: "numeric",
    timeZone: "Asia/Riyadh"
  }).format(date);
}

async function bayyinFetchSheet(sheetName) {
  const urls = [
    `https://docs.google.com/spreadsheets/d/${OFFICIAL_SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(sheetName)}&cacheBust=${Date.now()}`,
    `https://opensheet.elk.sh/${OFFICIAL_SHEET_ID}/${encodeURIComponent(sheetName)}?cacheBust=${Date.now()}`
  ];

  let lastError = null;

  for (const url of urls) {
    try {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const text = await response.text();

      /* OpenSheet returns plain JSON array */
      if (text.trim().startsWith("[")) {
        const rows = JSON.parse(text);
        return rows.filter(row => Object.values(row).some(value => String(value || "").trim() !== ""));
      }

      /* Google Visualization returns JS-wrapped JSON */
      const start = text.indexOf("{");
      const end = text.lastIndexOf("}") + 1;
      if (start < 0 || end <= start) throw new Error("Invalid Google Sheet response");

      const json = JSON.parse(text.slice(start, end));

      const columns = json.table.cols.map((col, index) =>
        String(col.label || col.id || `Column_${index + 1}`).trim()
      );

      return json.table.rows.map(row => {
        const object = {};
        columns.forEach((column, index) => {
          const cell = row.c[index];
          object[column] = cell ? (cell.f ?? cell.v ?? "") : "";
        });
        return object;
      }).filter(row => Object.values(row).some(value => String(value || "").trim() !== ""));
    } catch (error) {
      lastError = error;
      console.warn(`Bayyin sheet source failed for ${sheetName}:`, error);
    }
  }

  throw lastError || new Error(`Unable to fetch sheet: ${sheetName}`);
}

function bayyinSetSyncStatus(text) {
  const pill = document.getElementById("sheetSyncStatus");
  if (pill) pill.textContent = text;
}

function bayyinStampUpdateAsNow(update) {
  const now = bayyinFormatUpdateDate();

  return {
    ...update,
    time: now.time,
    date: now.date,
    timestamp: now.timestamp
  };
}


/* EXACT COLUMN MAPPING — per official sheet screenshots
   Main_Formula columns:
   Name | Brand name | Strength | الاسم | الاسم التجاري | Status

   Expiration columns:
   Name | five Expiry columns
*/
let bayyinMainFormulaIndex = new Map();

function bayyinGetColumn(row, names) {
  const normalized = {};
  Object.keys(row).forEach(key => normalized[bayyinCleanKey(key)] = row[key]);
  for (const name of names) {
    const value = normalized[bayyinCleanKey(name)];
    if (value !== undefined && value !== null && String(value).trim() !== "") return String(value).trim();
  }
  return "";
}

function bayyinMainFormulaInfo(row) {
  const name = bayyinGetColumn(row, ["Name"]);
  const brandName = bayyinGetColumn(row, ["Brand name", "Brand Name", "Brand"]);
  const strength = bayyinGetColumn(row, ["Strength"]);
  const nameAr = bayyinGetColumn(row, ["الاسم"]);
  const brandAr = bayyinGetColumn(row, ["الاسم التجاري"]);
  const status = bayyinGetColumn(row, ["Status"]);

  const displayArName = nameAr || brandAr || name || brandName;
  const displayEnName = name || brandName || nameAr || brandAr;

  return {
    key: bayyinCleanKey(name),
    name,
    brandName,
    strength,
    nameAr,
    brandAr,
    status,
    itemAr: [displayArName, strength].filter(Boolean).join(" — "),
    itemEn: [displayEnName, strength].filter(Boolean).join(" — ")
  };
}

function bayyinBuildMainFormulaIndex(rows) {
  bayyinMainFormulaIndex = new Map();
  rows.forEach(row => {
    const info = bayyinMainFormulaInfo(row);
    if (info.key) bayyinMainFormulaIndex.set(info.key, info);
  });
}

function bayyinExpiryColumnsFromRow(row) {
  return Object.keys(row)
    .filter(key => bayyinCleanKey(key).startsWith("expiry"))
    .map(key => row[key])
    .filter(value => String(value || "").trim() !== "")
    .slice(0, 5);
}

function bayyinFormularyRowToUpdate(row) {
  const info = bayyinMainFormulaInfo(row);
  const formatted = bayyinFormatUpdateDate();

  return {
    status: bayyinNormalizeStatus(info.status),
    itemAr: info.itemAr,
    itemEn: info.itemEn,
    code: info.name || info.brandName || info.itemEn || info.itemAr,
    noteAr: "تحديث من Main_Formula",
    noteEn: "Updated from Main_Formula",
    time: formatted.time,
    date: formatted.date,
    timestamp: formatted.timestamp,
    signature: JSON.stringify({
      status: bayyinNormalizeStatus(info.status),
      name: info.name,
      brandName: info.brandName,
      strength: info.strength,
      nameAr: info.nameAr,
      brandAr: info.brandAr
    })
  };
}
function bayyinExpirationRowToItem(row) {
  const itemAr =
    bayyinPickName(row, [
      "item_name_ar", "arabic_name", "name_ar", "arabic", "اسم الصنف عربي", "الاسم العربي",
      "اسم الصنف", "اسم الدواء", "الدواء", "الصنف", "generic_ar", "scientific_name_ar",
      "generic", "generic_name", "drug", "drug_name", "medication", "medication_name",
      "medicine", "medicine_name", "item", "item_name", "description", "trade_name",
      "الاسم العلمي", "الإسم العلمي", "المادة الفعالة"
    ]) ||
    bayyinBestNameValue(row);

  const itemEn =
    bayyinPickName(row, [
      "item_name_en", "english_name", "name_en", "english", "scientific_name",
      "generic", "generic_name", "drug", "drug_name", "medication", "medication_name",
      "medicine", "medicine_name", "item", "item_name", "description", "trade_name",
      "اسم الصنف انجليزي", "الاسم الانجليزي"
    ]) ||
    itemAr;

  const strength = bayyinPickStrength(row);

  const expiryRaw = bayyinPick(row, [
    "expiry_date", "expiration_date", "expiry", "expiration", "exp_date", "expire_date",
    "end_date", "date", "تاريخ الانتهاء", "تاريخ الإنتهاء", "انتهاء", "الصلاحية",
    "تاريخ الصلاحية", "تاريخ انتهاء الصلاحية", "expiry date", "expiration date"
  ]);

  const expiryDate = bayyinParseSheetDate(expiryRaw) || bayyinFindAnyDateInRow(row);
  if (!expiryDate) return null;

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const cleanExpiry = new Date(expiryDate);
  cleanExpiry.setHours(0, 0, 0, 0);

  const days = Math.ceil((cleanExpiry - today) / 86400000);

  return {
    itemAr: [itemAr, strength].filter(Boolean).join(" — "),
    itemEn: [itemEn, strength].filter(Boolean).join(" — "),
    date: bayyinFormatExpiryDate(cleanExpiry),
    days
  };
}
function bayyinDedupeUpdates(rows) {
  const latest = new Map();

  rows.forEach(row => {
    const key = row.code || row.itemAr || row.itemEn;
    const old = latest.get(key);

    if (!old || updateSortValue(row) > updateSortValue(old)) latest.set(key, row);
  });

  return [...latest.values()].sort((a, b) => updateSortValue(b) - updateSortValue(a));
}


async function bayyinFetchFormularyRows() {
  const possibleNames = ["Main_Formula", "Main_Formulary"];
  let lastError = null;
  for (const sheetName of possibleNames) {
    try {
      const rows = await bayyinFetchSheet(sheetName);
      if (rows.length) return rows;
    } catch (error) {
      lastError = error;
    }
  }
  throw lastError || new Error("Unable to fetch Main_Formula sheet");
}


async function bayyinSyncFormulary() {
  const rows = await bayyinFetchFormularyRows();
  bayyinBuildMainFormulaIndex(rows);

  const updates = rows
    .map(bayyinFormularyRowToUpdate)
    .filter(row => row.code && row.itemAr && row.status);

  const oldSnapshot = JSON.parse(localStorage.getItem(OFFICIAL_FORMULARY_SNAPSHOT_KEY) || "{}");
  const newSnapshot = {};
  const changed = [];

  updates.forEach(update => {
    const key = bayyinCleanKey(update.code);
    newSnapshot[key] = update.signature;

    if (!oldSnapshot[key] || oldSnapshot[key] !== update.signature) {
      changed.push(bayyinStampUpdateAsNow(update));
    }
  });

  if (!Object.keys(oldSnapshot).length) {
    BAYYIN_DATA.updates = bayyinDedupeUpdates(updates.map(bayyinStampUpdateAsNow));
  } else if (changed.length) {
    BAYYIN_DATA.updates = bayyinDedupeUpdates([...changed, ...BAYYIN_DATA.updates]);
  }

  localStorage.setItem(OFFICIAL_FORMULARY_SNAPSHOT_KEY, JSON.stringify(newSnapshot));

  updatePageIndex = 0;
  renderUpdatesPage(true);

  bayyinSetSyncStatus(`Main_Formula synced ${bayyinFormatUpdateDate().time}`);
}
/* Manual hard refresh from browser console if needed:
   bayyinResetFormularySnapshot()
*/
function bayyinResetFormularySnapshot() {
  localStorage.removeItem(OFFICIAL_FORMULARY_SNAPSHOT_KEY);
  bayyinSyncOfficialDatabase();
}

async function bayyinSyncExpiration() {
  if (!bayyinMainFormulaIndex.size) {
    try {
      const formularyRows = await bayyinFetchFormularyRows();
      bayyinBuildMainFormulaIndex(formularyRows);
    } catch (error) {
      console.warn("Bayyin expiration lookup: Main_Formula not ready", error);
    }
  }

  const rows = await bayyinFetchSheet(OFFICIAL_EXPIRATION_SHEET);
  const items = [];

  rows.forEach(row => {
    const rawName = bayyinGetColumn(row, ["Name"]);
    if (!rawName) return;

    const info = bayyinMainFormulaIndex.get(bayyinCleanKey(rawName)) || {
      itemAr: rawName,
      itemEn: rawName,
      strength: ""
    };

    bayyinExpiryColumnsFromRow(row).forEach(value => {
      const expiryDate = bayyinParseSheetDate(value);
      if (!expiryDate) return;

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const cleanExpiry = new Date(expiryDate);
      cleanExpiry.setHours(0, 0, 0, 0);

      const days = Math.ceil((cleanExpiry - today) / 86400000);

      items.push({
        itemAr: info.itemAr,
        itemEn: info.itemEn,
        date: bayyinFormatExpiryDate(cleanExpiry),
        days
      });
    });
  });

  if (!items.length) {
    console.warn("Bayyin expiration sync: no parseable expiration rows found.");
    return;
  }

  BAYYIN_DATA.expiry30 = items
    .filter(item => item.days >= 0 && item.days <= 30)
    .sort((a, b) => a.days - b.days);

  BAYYIN_DATA.expiry60 = items
    .filter(item => item.days > 30 && item.days <= 60)
    .sort((a, b) => a.days - b.days);

  renderExpiry("expiry30", BAYYIN_DATA.expiry30, "unavailable");
  renderExpiry("expiry60", BAYYIN_DATA.expiry60, "limited");

  if (window.lucide) lucide.createIcons();
}
async function bayyinSyncOfficialDatabase() {
  try {
    await Promise.all([
      bayyinSyncFormulary(),
      bayyinSyncExpiration()
    ]);
  } catch (error) {
    bayyinSetSyncStatus("Sheet sync failed");
    console.warn("Bayyin official database sync failed:", error);
  }
}

function startOfficialDatabaseSync() {
  bayyinSyncOfficialDatabase();
  setInterval(bayyinSyncOfficialDatabase, OFFICIAL_SYNC_EVERY_MS);
}


/* =========================================================
   HARD RUNTIME RULES — 9+ HOUR TV MODE
   Latest Updates:
   - 5 items per page
   - no scroll
   - page duration: 2 minutes

   Expiry Dates:
   - 5 items per page
   - no scroll
   - 30-day pages: 1 minute 40 seconds each
   - after 30-day pages finish => 60-day window
   - 60-day pages: 1 minute each
   - after 60-day pages finish => back to 30-day window
   ========================================================= */
const TV_PAGE_SIZE = 5;
const LATEST_PAGE_DURATION_MS = 120000;
const EXPIRY_30_PAGE_DURATION_MS = 100000;
const EXPIRY_60_PAGE_DURATION_MS = 60000;
const bayyinExpiryRuntime = { activeWindow: '30', page30: 0, page60: 0, timer: null, expiry30: [], expiry60: [] };
function bayyinChunk(items, size = TV_PAGE_SIZE) {
  const pages = [];
  for (let i = 0; i < items.length; i += size) pages.push(items.slice(i, i + size));
  return pages.length ? pages : [[]];
}
function bayyinFillFiveSlots(htmlRows, count) {
  const missing = Math.max(0, TV_PAGE_SIZE - count);
  return htmlRows + Array.from({ length: missing }).map(() => `<div class="tv-empty-slot"></div>`).join('');
}
function getUpdatePages() {
  const rows = getLatestUpdates();
  return bayyinChunk(rows, TV_PAGE_SIZE);
}
function renderUpdatesPage(animate = false) {
  const root = document.getElementById('updatesList');
  const pill = document.getElementById('updatePagePill');
  const pages = getUpdatePages();
  if (updatePageIndex >= pages.length) updatePageIndex = 0;
  const draw = () => {
    const current = pages[updatePageIndex];
    if (!current.length) {
      root.innerHTML = bayyinFillFiveSlots(`<div class="today-empty-card"><div><strong>لا توجد تحديثات لهذا اليوم</strong><span>No updates for today</span></div></div>`, 1);
      if (pill) pill.textContent = '0 / 0';
      return;
    }
    const rowsHtml = current.map(item => `
      <article class="notice-card" data-status="${item.status}">
        <div class="notice-icon"><i data-lucide="${STATUS_ICON[item.status]}"></i></div>
        <div class="notice-info"><h3 class="notice-title">${item.itemAr}</h3><p class="notice-sub en">${item.itemEn}</p></div>
        <div class="notice-meta"><strong>${item.time}</strong><span>${item.date}</span></div>
      </article>`).join('');
    root.innerHTML = bayyinFillFiveSlots(rowsHtml, current.length);
    if (pill) pill.textContent = `${updatePageIndex + 1} / ${pages.length}`;
    if (window.lucide) lucide.createIcons();
  };
  if (!animate) { draw(); return; }
  root.classList.add('page-changing');
  window.setTimeout(() => { draw(); requestAnimationFrame(() => root.classList.remove('page-changing')); }, 520);
}
function startUpdateRotation() {
  if (updateRotationTimer) clearInterval(updateRotationTimer);
  updateRotationTimer = setInterval(() => {
    const pages = getUpdatePages();
    if (pages.length <= 1) return;
    updatePageIndex = (updatePageIndex + 1) % pages.length;
    renderUpdatesPage(true);
  }, LATEST_PAGE_DURATION_MS);
}
function bayyinExpiryRow(item, status) {
  return `<article class="expiry-item notice-card" data-status="${status}">
    <div class="expiry-icon notice-icon"><i data-lucide="${status === 'unavailable' ? 'circle-x' : 'circle-alert'}"></i></div>
    <div class="expiry-info notice-info"><h3 class="notice-title">${item.itemAr}</h3><p class="notice-sub en">${item.itemEn}</p></div>
    <div class="expiry-date notice-meta"><strong>${item.date}</strong><span class="en">Expiry</span></div>
  </article>`;
}
function bayyinRenderExpiryList(targetId, pageItems, status) {
  const root = document.getElementById(targetId);
  if (!root) return;
  const rowsHtml = pageItems.map(item => bayyinExpiryRow(item, status)).join('');
  root.innerHTML = bayyinFillFiveSlots(rowsHtml, pageItems.length);
  if (window.lucide) lucide.createIcons();
}
function bayyinRenderExpiryCurrent(animate = false) {
  const stack = document.getElementById('expiryStack');
  const list30 = document.getElementById('expiry30');
  const list60 = document.getElementById('expiry60');
  if (!stack || !list30 || !list60) return;
  const pages30 = bayyinChunk(bayyinExpiryRuntime.expiry30, TV_PAGE_SIZE);
  const pages60 = bayyinChunk(bayyinExpiryRuntime.expiry60, TV_PAGE_SIZE);
  if (bayyinExpiryRuntime.page30 >= pages30.length) bayyinExpiryRuntime.page30 = 0;
  if (bayyinExpiryRuntime.page60 >= pages60.length) bayyinExpiryRuntime.page60 = 0;
  stack.classList.toggle('show-60', bayyinExpiryRuntime.activeWindow === '60');
  const draw = () => {
    bayyinRenderExpiryList('expiry30', pages30[bayyinExpiryRuntime.page30] || [], 'unavailable');
    bayyinRenderExpiryList('expiry60', pages60[bayyinExpiryRuntime.page60] || [], 'limited');
  };
  if (!animate) { draw(); return; }
  const activeList = bayyinExpiryRuntime.activeWindow === '60' ? list60 : list30;
  activeList.classList.add('page-changing');
  window.setTimeout(() => { draw(); requestAnimationFrame(() => activeList.classList.remove('page-changing')); }, 520);
}
function bayyinScheduleNextExpiryPage() {
  if (bayyinExpiryRuntime.timer) clearTimeout(bayyinExpiryRuntime.timer);
  const isThirty = bayyinExpiryRuntime.activeWindow === '30';
  const duration = isThirty ? EXPIRY_30_PAGE_DURATION_MS : EXPIRY_60_PAGE_DURATION_MS;
  bayyinExpiryRuntime.timer = setTimeout(() => {
    const pages30 = bayyinChunk(bayyinExpiryRuntime.expiry30, TV_PAGE_SIZE);
    const pages60 = bayyinChunk(bayyinExpiryRuntime.expiry60, TV_PAGE_SIZE);
    if (bayyinExpiryRuntime.activeWindow === '30') {
      bayyinExpiryRuntime.page30 += 1;
      if (bayyinExpiryRuntime.page30 >= pages30.length) { bayyinExpiryRuntime.page30 = 0; bayyinExpiryRuntime.activeWindow = '60'; bayyinExpiryRuntime.page60 = 0; }
    } else {
      bayyinExpiryRuntime.page60 += 1;
      if (bayyinExpiryRuntime.page60 >= pages60.length) { bayyinExpiryRuntime.page60 = 0; bayyinExpiryRuntime.activeWindow = '30'; bayyinExpiryRuntime.page30 = 0; }
    }
    bayyinRenderExpiryCurrent(true);
    bayyinScheduleNextExpiryPage();
  }, duration);
}
function startExpiryRotation() { bayyinRenderExpiryCurrent(false); bayyinScheduleNextExpiryPage(); }
function renderExpiry(targetId, items, status) {
  if (targetId === 'expiry30') bayyinExpiryRuntime.expiry30 = Array.isArray(items) ? items : [];
  if (targetId === 'expiry60') bayyinExpiryRuntime.expiry60 = Array.isArray(items) ? items : [];
  bayyinRenderExpiryCurrent(false);
}
function bindExpiryTabs() {
  const stack = document.getElementById('expiryStack');
  if (!stack) return;
  stack.querySelectorAll('[data-target]').forEach(tab => {
    tab.addEventListener('click', () => {
      bayyinExpiryRuntime.activeWindow = tab.dataset.target === '60' ? '60' : '30';
      bayyinRenderExpiryCurrent(true);
      bayyinScheduleNextExpiryPage();
    });
  });
}

function bayyinFetchAppsScriptJSONP() {
  return new Promise((resolve, reject) => {
    if (!BAYYIN_APPS_SCRIPT_URL || BAYYIN_APPS_SCRIPT_URL.includes("PASTE_")) {
      reject(new Error("Apps Script URL is missing"));
      return;
    }

    const callbackName = "bayyinCallback_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
    const script = document.createElement("script");
    const separator = BAYYIN_APPS_SCRIPT_URL.includes("?") ? "&" : "?";

    window[callbackName] = data => {
      delete window[callbackName];
      script.remove();
      resolve(data);
    };

    script.onerror = () => {
      delete window[callbackName];
      script.remove();
      reject(new Error("Apps Script JSONP failed"));
    };

    script.src = `${BAYYIN_APPS_SCRIPT_URL}${separator}callback=${callbackName}&t=${Date.now()}`;
    document.body.appendChild(script);
  });
}
