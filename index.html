<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bayyin TV Display</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --font-ar:"Noto Sans Arabic",sans-serif;
  --font-en:"Noto Sans",sans-serif;

  --bg:#1E2329;
  --surface:#232B32;
  --surface-soft:#2B333B;
  --border:rgba(255,255,255,.065);
  --text:#F5F7F8;
  --muted:#C6CDD2;

  --available:#00D979;
  --limited:#FFD21F;
  --unavailable:#FF4A4A;
  --expected:#4C8DFF;

  --shadow:0 1px 2px rgba(0,0,0,.18),0 18px 38px rgba(0,0,0,.24),0 42px 90px rgba(0,0,0,.20);
}

*{box-sizing:border-box}

html,body{
  width:100%;
  height:100%;
  margin:0;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-ar);
}

.en{
  font-family:var(--font-en);
  direction:ltr;
}

.tv-screen{
  width:100vw;
  height:100vh;
  padding:18px;
  display:grid;
  grid-template-rows:68px minmax(0,1fr);
  gap:18px;
}

.tv-top{
  display:grid;
  grid-template-columns:minmax(320px,.95fr) minmax(420px,1.7fr);
  gap:18px;
  align-items:center;
}

.time-group{
  display:flex;
  gap:12px;
  align-items:center;
  justify-self:start;
}

.date-pill,
.time-pill,
.department-pill,
.sync-pill{
  border:1px solid var(--border);
  background:linear-gradient(180deg,var(--surface),var(--surface-soft));
  box-shadow:var(--shadow);
  display:grid;
  place-items:center;
  font-weight:800;
}

.date-pill,
.time-pill{
  height:52px;
  border-radius:999px;
  font-family:var(--font-en);
}

.date-pill{
  min-width:168px;
  padding:0 22px;
  font-size:21px;
}

.time-pill{
  min-width:108px;
  padding:0 18px;
  font-size:22px;
}

.department-pill{
  justify-self:end;
  width:min(660px,100%);
  height:68px;
  border-radius:999px;
  padding:0 28px;
  font-size:30px;
  text-align:center;
}

.tv-main{
  min-height:0;
  display:grid;
  grid-template-columns:minmax(0,55fr) minmax(0,45fr);
  gap:14px;
  overflow:hidden;
}

.panel{
  min-height:0;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:28px;
  box-shadow:var(--shadow);
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:14px;
  overflow:hidden;
}

.panel-head{
  flex:0 0 auto;
  padding-bottom:12px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
}

.panel-title{
  margin:0;
  font-size:28px;
  line-height:1.25;
  font-weight:800;
}

.panel-sub{
  margin:4px 0 0;
  color:var(--muted);
  font-family:var(--font-en);
  font-size:13px;
}

.sync-pill{
  height:30px;
  min-width:130px;
  padding:0 12px;
  border-radius:999px;
  font-family:var(--font-en);
  font-size:11px;
  color:var(--muted);
  box-shadow:none;
}

.page-pill{
  height:34px;
  min-width:74px;
  padding:0 14px;
  border-radius:999px;
  display:grid;
  place-items:center;
  font-family:var(--font-en);
  font-weight:800;
  font-size:13px;
  color:var(--muted);
  background:linear-gradient(180deg,var(--surface),var(--surface-soft));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.18);
}

.list{
  flex:1 1 auto;
  min-height:0;
  display:grid;
  grid-template-rows:repeat(5,minmax(0,1fr));
  gap:14px;
  overflow:hidden;
}

.card{
  position:relative;
  isolation:isolate;
  overflow:hidden;
  display:grid;
  direction:ltr;
  grid-template-columns:repeat(4,minmax(0,1fr));
  grid-template-areas:"meta info info icon";
  gap:16px;
  align-items:center;
  padding:12px 18px;
  border-radius:18px;
  background:linear-gradient(180deg,var(--surface),var(--surface-soft));
  box-shadow:0 1px 2px rgba(0,0,0,.10),0 10px 24px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.10);
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:-1;
  pointer-events:none;
}

.card[data-status="available"]::before{
  background:linear-gradient(270deg,rgba(0,217,121,.24) 0%,rgba(0,217,121,.14) 23%,rgba(0,217,121,.045) 52%,transparent 76%);
}

.card[data-status="limited"]::before{
  background:linear-gradient(270deg,rgba(255,210,31,.24) 0%,rgba(255,210,31,.14) 23%,rgba(255,210,31,.045) 52%,transparent 76%);
}

.card[data-status="unavailable"]::before{
  background:linear-gradient(270deg,rgba(255,74,74,.24) 0%,rgba(255,74,74,.14) 23%,rgba(255,74,74,.045) 52%,transparent 76%);
}

.card[data-status="expected"]::before{
  background:linear-gradient(270deg,rgba(76,141,255,.24) 0%,rgba(76,141,255,.14) 23%,rgba(76,141,255,.045) 52%,transparent 76%);
}

.icon{
  grid-area:icon;
  width:54px;
  height:54px;
  border-radius:50%;
  display:grid;
  place-items:center;
  justify-self:center;
  position:relative;
  font-size:26px;
  font-weight:900;
}

.icon::before{
  content:"";
  position:absolute;
  inset:-7px;
  border-radius:50%;
  background:currentColor;
  opacity:.15;
}

.card[data-status="available"] .icon{color:var(--available)}
.card[data-status="limited"] .icon{color:var(--limited)}
.card[data-status="unavailable"] .icon{color:var(--unavailable)}
.card[data-status="expected"] .icon{color:var(--expected)}

.info{
  grid-area:info;
  min-width:0;
  direction:rtl;
  text-align:right;
}

.title{
  margin:0;
  font-size:clamp(16px,1.15vw,21px);
  line-height:1.28;
  font-weight:800;
  color:var(--text);
}

.sub{
  margin:5px 0 0;
  color:var(--muted);
  font-size:clamp(12px,.82vw,14px);
  line-height:1.35;
  font-weight:500;
  direction:ltr;
  text-align:left;
}

.meta{
  grid-area:meta;
  justify-self:end;
  text-align:end;
  direction:ltr;
  font-family:var(--font-en);
  color:var(--muted);
  display:grid;
  gap:2px;
  white-space:nowrap;
}

.meta strong{
  color:var(--text);
  font-size:15px;
  font-weight:800;
}

.meta span{
  font-size:13px;
  font-weight:600;
}

.expiry-panel{
  display:grid;
  grid-template-rows:1fr 1fr;
  gap:14px;
  min-height:0;
}

.expiry-box{
  min-height:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border-radius:22px;
  background:linear-gradient(180deg,var(--surface),var(--surface-soft));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 12px 28px rgba(0,0,0,.16);
}

.expiry-head{
  flex:0 0 auto;
  height:54px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  font-weight:900;
}

.expiry-head.red{
  color:#FFC0C0;
  background:linear-gradient(180deg,rgba(255,74,74,.22),rgba(255,74,74,.04));
}

.expiry-head.yellow{
  color:#FFE1A3;
  background:linear-gradient(180deg,rgba(255,210,31,.22),rgba(255,210,31,.04));
}

.expiry-list{
  min-height:0;
  flex:1 1 auto;
  display:grid;
  grid-template-rows:repeat(5,minmax(0,1fr));
  gap:10px;
  padding:12px;
  overflow:hidden;
}

.expiry-card{
  min-height:0;
  padding:9px 12px;
}

.empty-slot{
  border-radius:18px;
  opacity:.24;
  background:linear-gradient(180deg,var(--surface),var(--surface-soft));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
}

.empty-message{
  grid-row:span 5;
  display:grid;
  place-items:center;
  text-align:center;
  color:var(--muted);
  border-radius:18px;
  background:linear-gradient(180deg,var(--surface),var(--surface-soft));
}

.empty-message strong{
  color:var(--text);
  display:block;
  font-size:20px;
  margin-bottom:6px;
}

.fade-change{
  opacity:0;
  transform:translateY(14px) scale(.992);
  filter:blur(3px);
  transition:opacity 520ms cubic-bezier(.2,.8,.2,1),transform 520ms cubic-bezier(.2,.8,.2,1),filter 520ms cubic-bezier(.2,.8,.2,1);
}
</style>
</head>

<body>
<main class="tv-screen">

  <header class="tv-top">
    <div class="time-group">
      <div class="date-pill" id="datePill">00/00/0000</div>
      <div class="time-pill" id="timePill">00:00</div>
    </div>

    <div class="department-pill">Supply Department</div>
  </header>

  <section class="tv-main">

    <section class="panel">
      <header class="panel-head">
        <div>
          <h2 class="panel-title">آخر التحديثات</h2>
          <p class="panel-sub">Latest Updates</p>
          <div class="sync-pill" id="syncStatus">Connecting…</div>
        </div>
        <div class="page-pill" id="updatePagePill">1 / 1</div>
      </header>

      <div class="list" id="updatesList"></div>
    </section>

    <section class="panel expiry-panel">

      <div class="expiry-box">
        <div class="expiry-head red">
          <span>تنتهي خلال 30 يوم</span>
          <span class="en">30 Days</span>
        </div>
        <div class="expiry-list" id="expiry30"></div>
      </div>

      <div class="expiry-box">
        <div class="expiry-head yellow">
          <span>تنتهي خلال 60 يوم</span>
          <span class="en">60 Days</span>
        </div>
        <div class="expiry-list" id="expiry60"></div>
      </div>

    </section>

  </section>
</main>

<script>
/* رابط Apps Script Web App */
const BAYYIN_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx9hghgkQogSuVhF0r_obgqosp8yZpyE_2l112Lu7DqehyDZCOLqWZFGpVT9FL8Ysj3YA/exec";

const PAGE_SIZE = 5;
const SYNC_EVERY_MS = 20000;
const UPDATE_PAGE_EVERY_MS = 120000;

let bayyinData = {
  updatesToday: [],
  expiry30: [],
  expiry60: []
};

let updatePageIndex = 0;
let updateTimer = null;

function escapeHtml(value){
  return String(value || "").replace(/[&<>"']/g, c => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[c]));
}

function chunk(items, size){
  const pages = [];
  for(let i = 0; i < items.length; i += size){
    pages.push(items.slice(i, i + size));
  }
  return pages.length ? pages : [[]];
}

function iconForStatus(status){
  if(status === "available") return "✓";
  if(status === "limited") return "!";
  if(status === "unavailable") return "×";
  return "⏱";
}

function setSyncStatus(text){
  document.getElementById("syncStatus").textContent = text;
}

function fetchAppsScriptJSONP(){
  return new Promise((resolve, reject) => {
    const callbackName = "bayyinCallback_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
    const script = document.createElement("script");
    const separator = BAYYIN_APPS_SCRIPT_URL.includes("?") ? "&" : "?";

    window[callbackName] = data => {
      delete window[callbackName];
      script.remove();
      resolve(data);
    };

    script.onerror = () => {
      delete window[callbackName];
      script.remove();
      reject(new Error("Apps Script JSONP failed"));
    };

    script.src = `${BAYYIN_APPS_SCRIPT_URL}${separator}callback=${callbackName}&t=${Date.now()}`;
    document.body.appendChild(script);
  });
}

async function syncData(){
  try{
    const data = await fetchAppsScriptJSONP();

    if(!data || !data.ok){
      throw new Error(data && data.error ? data.error : "Invalid Apps Script response");
    }

    bayyinData.updatesToday = Array.isArray(data.updatesToday) ? data.updatesToday : [];
    bayyinData.expiry30 = Array.isArray(data.expiry30) ? data.expiry30 : [];
    bayyinData.expiry60 = Array.isArray(data.expiry60) ? data.expiry60 : [];

    updatePageIndex = 0;
    renderAll();

    const time = new Intl.DateTimeFormat("en-GB", {
      hour:"2-digit",
      minute:"2-digit",
      hour12:false,
      timeZone:"Asia/Riyadh"
    }).format(new Date());

    setSyncStatus("Synced " + time);
  }catch(error){
    setSyncStatus("Sync failed");
    console.warn("Bayyin sync failed:", error);
  }
}

function renderUpdateCard(item){
  const status = item.status || "expected";

  return `
    <article class="card" data-status="${escapeHtml(status)}">
      <div class="icon">${iconForStatus(status)}</div>

      <div class="info">
        <h3 class="title">${escapeHtml(item.itemAr || item.itemEn || "غير محدد")}</h3>
        <p class="sub en">${escapeHtml(item.itemEn || item.itemAr || "")}</p>
      </div>

      <div class="meta">
        <strong>${escapeHtml(item.time || "--:--")}</strong>
        <span>${escapeHtml(item.date || "")}</span>
      </div>
    </article>
  `;
}

function renderExpiryCard(item, status){
  return `
    <article class="card expiry-card" data-status="${status}">
      <div class="icon">${status === "unavailable" ? "×" : "!"}</div>

      <div class="info">
        <h3 class="title">${escapeHtml(item.itemAr || item.itemEn || "غير محدد")}</h3>
        <p class="sub en">${escapeHtml(item.itemEn || item.itemAr || "")}</p>
      </div>

      <div class="meta">
        <strong>${escapeHtml(item.date || "")}</strong>
        <span>${escapeHtml(item.days !== undefined ? item.days + " days" : "Expiry")}</span>
      </div>
    </article>
  `;
}

function fillFive(html, count){
  const missing = Math.max(0, PAGE_SIZE - count);
  return html + Array.from({length:missing}).map(() => `<div class="empty-slot"></div>`).join("");
}

function renderUpdates(){
  const root = document.getElementById("updatesList");
  const pill = document.getElementById("updatePagePill");

  const updates = bayyinData.updatesToday || [];
  const pages = chunk(updates, PAGE_SIZE);

  if(updatePageIndex >= pages.length) updatePageIndex = 0;

  const current = pages[updatePageIndex];

  if(!current.length){
    root.innerHTML = `
      <div class="empty-message">
        <div>
          <strong>لا توجد تحديثات لهذا اليوم</strong>
          <span class="en">No updates for today</span>
        </div>
      </div>
    `;
    pill.textContent = "0 / 0";
    return;
  }

  const html = current.map(renderUpdateCard).join("");
  root.innerHTML = fillFive(html, current.length);
  pill.textContent = `${updatePageIndex + 1} / ${pages.length}`;
}

function renderExpiryList(id, items, status){
  const root = document.getElementById(id);
  const list = items || [];
  const firstPage = list.slice(0, PAGE_SIZE);

  if(!firstPage.length){
    root.innerHTML = `
      <div class="empty-message">
        <div>
          <strong>لا توجد أصناف</strong>
          <span class="en">No items</span>
        </div>
      </div>
    `;
    return;
  }

  const html = firstPage.map(item => renderExpiryCard(item, status)).join("");
  root.innerHTML = fillFive(html, firstPage.length);
}

function renderAll(){
  renderUpdates();
  renderExpiryList("expiry30", bayyinData.expiry30, "unavailable");
  renderExpiryList("expiry60", bayyinData.expiry60, "limited");
}

function startUpdateRotation(){
  if(updateTimer) clearInterval(updateTimer);

  updateTimer = setInterval(() => {
    const pages = chunk(bayyinData.updatesToday || [], PAGE_SIZE);
    if(pages.length <= 1) return;

    updatePageIndex = (updatePageIndex + 1) % pages.length;
    renderUpdates();
  }, UPDATE_PAGE_EVERY_MS);
}

function updateClock(){
  const now = new Date();

  document.getElementById("timePill").textContent =
    new Intl.DateTimeFormat("en-GB", {
      hour:"2-digit",
      minute:"2-digit",
      hour12:false,
      timeZone:"Asia/Riyadh"
    }).format(now);

  document.getElementById("datePill").textContent =
    new Intl.DateTimeFormat("en-GB", {
      day:"2-digit",
      month:"2-digit",
      year:"numeric",
      timeZone:"Asia/Riyadh"
    }).format(now);
}

function init(){
  updateClock();
  setInterval(updateClock, 60000);

  renderAll();
  syncData();
  setInterval(syncData, SYNC_EVERY_MS);

  startUpdateRotation();
}

init();
</script>
</body>
</html>
