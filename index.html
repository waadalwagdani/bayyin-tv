<!doctype html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bayyin TV Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--font-ar:"Noto Sans Arabic",sans-serif;--font-en:"Noto Sans",sans-serif;--bg:#FAFAFA;--surface:#FFFFFF;--surface-soft:#F6F6F6;--border:#E6E6E6;--text:#111111;--muted:#6F6F6F;--available:#00A85A;--limited:#C99A00;--unavailable:#D92D20;--expected:#2563EB;--shadow:0 1px 2px rgba(0,0,0,.035),0 12px 28px rgba(0,0,0,.075),0 30px 70px rgba(0,0,0,.035)}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-ar)}.en{font-family:var(--font-en);direction:ltr}.tv-screen{width:100vw;height:100vh;padding:18px;display:grid;grid-template-rows:68px minmax(0,1fr);gap:18px}.tv-top{display:grid;grid-template-columns:minmax(320px,.95fr) minmax(420px,1.7fr);gap:18px;align-items:center}.time-group{display:flex;gap:12px;align-items:center;justify-self:start}.date-pill,.time-pill,.department-pill,.sync-pill{border:1px solid var(--border);background:linear-gradient(180deg,var(--surface),var(--surface-soft));box-shadow:var(--shadow);display:grid;place-items:center;font-weight:800}.date-pill,.time-pill{height:52px;border-radius:999px;font-family:var(--font-en)}.date-pill{min-width:168px;padding:0 22px;font-size:21px}.time-pill{min-width:108px;padding:0 18px;font-size:22px}.department-pill{justify-self:end;width:min(660px,100%);height:68px;border-radius:999px;padding:0 28px;font-size:30px;text-align:center}.tv-main{min-height:0;display:grid;grid-template-columns:minmax(0,55fr) minmax(0,45fr);gap:14px;overflow:hidden}.panel{min-height:0;background:var(--surface);border:1px solid var(--border);border-radius:28px;box-shadow:var(--shadow);padding:18px;display:flex;flex-direction:column;gap:14px;overflow:hidden}.panel-head{flex:0 0 auto;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.panel-title{margin:0;font-size:28px;line-height:1.25;font-weight:800}.panel-sub{margin:4px 0 0;color:var(--muted);font-family:var(--font-en);font-size:13px}.sync-pill{height:30px;min-width:170px;padding:0 12px;border-radius:999px;font-family:var(--font-en);font-size:11px;color:var(--muted);box-shadow:none;margin-top:8px}.page-pill{height:34px;min-width:74px;padding:0 14px;border-radius:999px;display:grid;place-items:center;font-family:var(--font-en);font-weight:800;font-size:13px;color:var(--muted);background:linear-gradient(180deg,var(--surface),var(--surface-soft));box-shadow:inset 0 1px 0 rgba(255,255,255,.35)}.list{flex:1 1 auto;min-height:0;display:grid;grid-template-rows:repeat(5,minmax(0,1fr));gap:14px;overflow:hidden}.card{position:relative;isolation:isolate;overflow:hidden;display:grid;direction:ltr;grid-template-columns:repeat(4,minmax(0,1fr));grid-template-areas:"meta info info icon";gap:16px;align-items:center;padding:12px 18px;border-radius:18px;background:linear-gradient(180deg,var(--surface),var(--surface-soft));box-shadow:0 1px 2px rgba(0,0,0,.035),0 10px 24px rgba(0,0,0,.065),inset 0 1px 0 rgba(255,255,255,.70)}.card::before{content:"";position:absolute;inset:0;z-index:-1;pointer-events:none}.card[data-status="available"]::before{background:linear-gradient(270deg,rgba(0,168,90,.24) 0%,rgba(0,168,90,.14) 23%,rgba(0,168,90,.045) 52%,transparent 76%)}.card[data-status="limited"]::before{background:linear-gradient(270deg,rgba(201,154,0,.24) 0%,rgba(201,154,0,.14) 23%,rgba(201,154,0,.045) 52%,transparent 76%)}.card[data-status="unavailable"]::before{background:linear-gradient(270deg,rgba(217,45,32,.24) 0%,rgba(217,45,32,.14) 23%,rgba(217,45,32,.045) 52%,transparent 76%)}.card[data-status="expected"]::before{background:linear-gradient(270deg,rgba(37,99,235,.24) 0%,rgba(37,99,235,.14) 23%,rgba(37,99,235,.045) 52%,transparent 76%)}.icon{grid-area:icon;width:54px;height:54px;border-radius:50%;display:grid;place-items:center;justify-self:center;position:relative;font-size:26px;font-weight:900}.icon::before{content:"";position:absolute;inset:-7px;border-radius:50%;background:currentColor;opacity:.14}.card[data-status="available"] .icon{color:var(--available)}.card[data-status="limited"] .icon{color:var(--limited)}.card[data-status="unavailable"] .icon{color:var(--unavailable)}.card[data-status="expected"] .icon{color:var(--expected)}.info{grid-area:info;min-width:0;direction:rtl;text-align:right}.title{margin:0;font-size:clamp(16px,1.15vw,21px);line-height:1.28;font-weight:800;color:var(--text)}.sub{margin:5px 0 0;color:var(--muted);font-size:clamp(12px,.82vw,14px);line-height:1.35;font-weight:500;direction:ltr;text-align:left}.meta{grid-area:meta;justify-self:end;text-align:end;direction:ltr;font-family:var(--font-en);color:var(--muted);display:grid;gap:2px;white-space:nowrap}.meta strong{color:var(--text);font-size:15px;font-weight:800}.meta span{font-size:13px;font-weight:600}.expiry-panel{display:grid;grid-template-rows:1fr 1fr;gap:14px;min-height:0}.expiry-box{min-height:0;display:flex;flex-direction:column;overflow:hidden;border-radius:22px;background:linear-gradient(180deg,var(--surface),var(--surface-soft));box-shadow:0 1px 2px rgba(0,0,0,.035),0 12px 28px rgba(0,0,0,.060),inset 0 1px 0 rgba(255,255,255,.70)}.expiry-head{flex:0 0 auto;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-weight:900}.expiry-head.red{color:#B42318;background:linear-gradient(180deg,rgba(217,45,32,.18),rgba(217,45,32,.035))}.expiry-head.yellow{color:#8D6B00;background:linear-gradient(180deg,rgba(201,154,0,.18),rgba(201,154,0,.035))}.expiry-list{min-height:0;flex:1 1 auto;display:grid;grid-template-rows:repeat(3,minmax(0,1fr));gap:10px;padding:12px;overflow:hidden}.expiry-card{min-height:0;padding:9px 12px}.empty-slot{border-radius:18px;opacity:.25;background:linear-gradient(180deg,var(--surface),var(--surface-soft));box-shadow:inset 0 1px 0 rgba(255,255,255,.55)}.empty-message{grid-row:span 5;display:grid;place-items:center;text-align:center;color:var(--muted);border-radius:18px;background:linear-gradient(180deg,var(--surface),var(--surface-soft))}.empty-message strong{color:var(--text);display:block;font-size:20px;margin-bottom:6px}.list,.expiry-list{transition:opacity 620ms cubic-bezier(.2,.8,.2,1),transform 620ms cubic-bezier(.2,.8,.2,1),filter 620ms cubic-bezier(.2,.8,.2,1);will-change:opacity,transform,filter}.list.page-changing,.expiry-list.page-changing{opacity:0;transform:translateY(12px) scale(.992);filter:blur(2px)}


/* =========================================================
   BAYYIN TV SAFE-FIT MODE
   حل مشكلة قص البيانات على التلفزيون:
   - مساحة آمنة من أطراف الشاشة
   - الاسم يأخذ عرض أكبر بدل ما ينحشر
   - حجم واضح بدون خروج خارج الكروت
   - لا تغيير في السينك ولا توقيت الصفحات
   ========================================================= */
html,body{
  overscroll-behavior:none;
}
.tv-screen{
  width:100vw;
  height:100dvh;
  padding:clamp(22px,2vw,52px);
  grid-template-rows:clamp(64px,7vh,92px) minmax(0,1fr);
  gap:clamp(14px,1.3vw,26px);
}
.tv-top{
  gap:clamp(14px,1.3vw,26px);
}
.date-pill,
.time-pill{
  height:clamp(52px,5.2vh,72px);
  font-size:clamp(21px,1.45vw,34px);
}
.date-pill{
  min-width:clamp(170px,12vw,260px);
}
.time-pill{
  min-width:clamp(112px,8vw,170px);
}
.department-pill{
  height:clamp(64px,7vh,92px);
  font-size:clamp(30px,2.1vw,48px);
}
.tv-main{
  grid-template-columns:minmax(0,54fr) minmax(0,46fr);
  gap:clamp(14px,1.3vw,26px);
}
.panel{
  border-radius:clamp(26px,2vw,42px);
  padding:clamp(18px,1.55vw,32px);
  gap:clamp(14px,1.25vw,24px);
}
.panel-head{
  padding-bottom:clamp(12px,1vw,20px);
}
.panel-title{
  font-size:clamp(30px,2vw,48px);
}
.panel-sub{
  font-size:clamp(14px,.95vw,22px);
}
.sync-pill{
  height:clamp(30px,3.1vh,42px);
  min-width:clamp(170px,12vw,260px);
  font-size:clamp(12px,.8vw,18px);
}
.page-pill{
  height:clamp(36px,3.7vh,50px);
  min-width:clamp(78px,6vw,120px);
  font-size:clamp(14px,.9vw,20px);
}
.list{
  gap:clamp(12px,1vw,22px);
}
.card{
  /* بدل 4 أرباع ضيقة: خلي الاسم ياخذ أكبر مساحة ممكنة */
  grid-template-columns:minmax(92px,7vw) minmax(0,1fr) minmax(64px,5.8vw);
  grid-template-areas:"meta info icon";
  gap:clamp(10px,1vw,22px);
  padding:clamp(13px,1.08vw,24px);
  border-radius:clamp(20px,1.5vw,32px);
  overflow:hidden;
}
.icon{
  width:clamp(58px,4.7vw,96px);
  height:clamp(58px,4.7vw,96px);
  font-size:clamp(30px,2.5vw,54px);
}
.icon::before{
  inset:clamp(-9px,-.7vw,-5px);
}
.info{
  min-width:0;
  max-width:100%;
  padding-inline:clamp(4px,.45vw,10px);
}
.title{
  font-size:clamp(22px,1.38vw,36px);
  line-height:1.18;
  overflow-wrap:anywhere;
  word-break:normal;
}
.sub{
  margin-top:clamp(5px,.45vw,10px);
  font-size:clamp(16px,.92vw,24px);
  line-height:1.22;
  text-align:right;
  overflow-wrap:anywhere;
  word-break:normal;
}
.meta strong{
  font-size:clamp(18px,1.2vw,30px);
}
.meta span{
  font-size:clamp(14px,.86vw,22px);
}
.expiry-panel{
  gap:clamp(14px,1.2vw,26px);
}
.expiry-box{
  border-radius:clamp(24px,1.7vw,36px);
}
.expiry-head{
  height:clamp(58px,5.8vh,78px);
  padding:0 clamp(16px,1.2vw,26px);
  font-size:clamp(20px,1.25vw,30px);
}
.expiry-list{
  gap:clamp(10px,.8vw,18px);
  padding:clamp(12px,1vw,22px);
}
.expiry-card{
  grid-template-columns:minmax(90px,6.4vw) minmax(0,1fr) minmax(58px,4.9vw);
  padding:clamp(13px,.9vw,20px);
}
.expiry-card .title{
  font-size:clamp(20px,1.18vw,32px);
}
.expiry-card .sub{
  font-size:clamp(15px,.82vw,22px);
}
.empty-message strong{
  font-size:clamp(22px,1.4vw,34px);
}
.empty-message span{
  font-size:clamp(15px,.95vw,24px);
}
.empty-slot{
  border-radius:clamp(20px,1.4vw,30px);
}

/* لو المتصفح مو Full Screen وفيه شريط علوي/تاسكبار، يصغر شوي عشان ما ينقص */
@media (max-height:850px){
  .tv-screen{padding:20px;gap:14px;grid-template-rows:60px minmax(0,1fr)}
  .department-pill{height:60px;font-size:28px}
  .date-pill,.time-pill{height:50px;font-size:20px}
  .panel{padding:16px;gap:12px}
  .panel-title{font-size:28px}
  .panel-head{padding-bottom:10px}
  .card{padding:10px 14px;gap:10px;grid-template-columns:82px minmax(0,1fr) 58px}
  .icon{width:52px;height:52px;font-size:28px}
  .title{font-size:20px;line-height:1.16}
  .sub{font-size:14px;line-height:1.16;margin-top:4px}
  .meta strong{font-size:16px}.meta span{font-size:12px}
  .expiry-head{height:50px;font-size:18px}
  .expiry-list{padding:10px;gap:8px}
}



/* =========================================================
   PATCH V5 — ALL CARDS COMPACT BALANCED
   يطبق على آخر التحديثات + تواريخ الانتهاء:
   - تصغير الدوائر
   - تخفيف سمك العربي
   - منع خروج النص من الكرت
   - حفظ تبديل الصفحات 35 ثانية والسينك 20 ثانية
   ========================================================= */
.card{
  overflow:hidden !important;
  grid-template-columns:minmax(104px,7.2vw) minmax(0,1fr) minmax(62px,4.9vw) !important;
  grid-template-areas:"meta info icon" !important;
  gap:clamp(8px,.75vw,16px) !important;
  padding:clamp(12px,.85vw,18px) clamp(16px,1vw,24px) !important;
  align-items:center !important;
}
.icon{
  width:clamp(42px,3.25vw,66px) !important;
  height:clamp(42px,3.25vw,66px) !important;
  font-size:clamp(24px,1.85vw,36px) !important;
  justify-self:center !important;
  margin:0 !important;
}
.icon::before{
  inset:-4px !important;
  opacity:.12 !important;
}
.info{
  overflow:hidden !important;
  padding-inline:clamp(4px,.35vw,8px) !important;
}
.title{
  font-size:clamp(20px,1.05vw,30px) !important;
  font-weight:700 !important;
  line-height:1.17 !important;
  letter-spacing:0 !important;
  display:-webkit-box !important;
  -webkit-line-clamp:2 !important;
  -webkit-box-orient:vertical !important;
  overflow:hidden !important;
  text-overflow:ellipsis !important;
}
.sub{
  margin-top:4px !important;
  font-size:clamp(14px,.75vw,20px) !important;
  font-weight:400 !important;
  line-height:1.12 !important;
  color:#666 !important;
  text-align:right !important;
  display:-webkit-box !important;
  -webkit-line-clamp:1 !important;
  -webkit-box-orient:vertical !important;
  overflow:hidden !important;
  text-overflow:ellipsis !important;
}
.meta{
  justify-self:start !important;
  text-align:start !important;
  min-width:clamp(92px,6.7vw,132px) !important;
}
.meta strong{
  font-size:clamp(16px,.95vw,24px) !important;
  line-height:1.08 !important;
}
.meta span{
  font-size:clamp(12px,.72vw,18px) !important;
  line-height:1.08 !important;
}
.expiry-card{
  grid-template-columns:minmax(104px,7.2vw) minmax(0,1fr) minmax(52px,4.2vw) !important;
  padding:clamp(11px,.78vw,16px) clamp(14px,.9vw,20px) !important;
}
.expiry-card .icon{
  width:clamp(34px,2.45vw,48px) !important;
  height:clamp(34px,2.45vw,48px) !important;
  font-size:clamp(19px,1.35vw,26px) !important;
}
.expiry-card .title{
  font-size:clamp(18px,.95vw,27px) !important;
}
.expiry-card .sub{
  font-size:clamp(13px,.68vw,18px) !important;
}
.expiry-card .meta strong{
  font-size:clamp(14px,.8vw,20px) !important;
}
.expiry-card .meta span{
  font-size:clamp(11px,.62vw,15px) !important;
}

@media (max-height:850px){
  .card{
    grid-template-columns:84px minmax(0,1fr) 46px !important;
    padding:10px 13px !important;
    gap:8px !important;
  }
  .icon{width:34px !important;height:34px !important;font-size:19px !important;}
  .icon::before{inset:-2px !important;}
  .title{font-size:17px !important;font-weight:700 !important;line-height:1.14 !important;}
  .sub{font-size:12px !important;line-height:1.1 !important;}
  .meta strong{font-size:13px !important;}
  .meta span{font-size:10px !important;}
}

</style>
</head>
<body>
<main class="tv-screen"><header class="tv-top"><div class="time-group"><div class="date-pill" id="datePill">00/00/0000</div><div class="time-pill" id="timePill">00:00</div></div><div class="department-pill">Supply Department</div></header><section class="tv-main"><section class="panel"><header class="panel-head"><div><h2 class="panel-title">آخر التحديثات</h2><p class="panel-sub">Latest Updates</p><div class="sync-pill" id="syncStatus">Connecting…</div></div><div class="page-pill" id="updatePagePill">1 / 1</div></header><div class="list" id="updatesList"></div></section><section class="panel expiry-panel"><div class="expiry-box"><div class="expiry-head red"><span>تنتهي خلال 30 يوم</span><span class="en" id="expiry30PagePill">30D</span></div><div class="expiry-list" id="expiry30"></div></div><div class="expiry-box"><div class="expiry-head yellow"><span>تنتهي خلال 60 يوم</span><span class="en" id="expiry60PagePill">60D</span></div><div class="expiry-list" id="expiry60"></div></div></section></section></main>
<script>
const BAYYIN_APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbySUxng_6BG9ygJM5pAxBgukEbmfQ6_TABlUiSboi3D8Wu2GgD4RdHIU2E50yR2_c0O/exec";
const UPDATE_PAGE_SIZE=5,EXPIRY_PAGE_SIZE=3,SYNC_EVERY_MS=20000,UPDATE_PAGE_EVERY_MS=35000,EXPIRY_PAGE_EVERY_MS=35000;
let bayyinData={updatesToday:[],expiry30:[],expiry60:[]},lastDataSignature="",updatePageIndex=0,expiry30PageIndex=0,expiry60PageIndex=0,updateTimer=null,expiryTimer=null;
function escapeHtml(value){return String(value||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function chunk(items,size){const pages=[];for(let i=0;i<items.length;i+=size)pages.push(items.slice(i,i+size));return pages.length?pages:[[]]}
function iconForStatus(status){if(status==="available")return"✓";if(status==="limited")return"!";if(status==="unavailable")return"×";return"⏱"}
function setSyncStatus(text){document.getElementById("syncStatus").textContent=text}
function fetchAppsScriptJSONP(){return new Promise((resolve,reject)=>{const callbackName="bayyinCallback_"+Date.now()+"_"+Math.floor(Math.random()*100000);const script=document.createElement("script");const separator=BAYYIN_APPS_SCRIPT_URL.includes("?")?"&":"?";const timeout=setTimeout(()=>{delete window[callbackName];script.remove();reject(new Error("Apps Script timeout"))},15000);window[callbackName]=data=>{clearTimeout(timeout);delete window[callbackName];script.remove();resolve(data)};script.onerror=()=>{clearTimeout(timeout);delete window[callbackName];script.remove();reject(new Error("Apps Script JSONP failed"))};script.src=BAYYIN_APPS_SCRIPT_URL+separator+"callback="+callbackName+"&tv=1&t="+Date.now();document.body.appendChild(script)})}
async function syncData(){try{const data=await fetchAppsScriptJSONP();if(!data||!data.ok)throw new Error(data&&data.error?data.error:"Invalid Apps Script response");const nextData={updatesToday:Array.isArray(data.updatesToday)?data.updatesToday:[],expiry30:Array.isArray(data.expiry30)?data.expiry30:[],expiry60:Array.isArray(data.expiry60)?data.expiry60:[]};const nextSignature=JSON.stringify(nextData);if(nextSignature!==lastDataSignature){bayyinData=nextData;lastDataSignature=nextSignature;updatePageIndex=0;expiry30PageIndex=0;expiry60PageIndex=0;renderAll(true)}const time=new Intl.DateTimeFormat("en-GB",{hour:"2-digit",minute:"2-digit",hour12:false,timeZone:"Asia/Riyadh"}).format(new Date());setSyncStatus("Synced "+time)}catch(error){setSyncStatus("Sync failed — keeping last data");const hasExistingData=(bayyinData.updatesToday&&bayyinData.updatesToday.length)||(bayyinData.expiry30&&bayyinData.expiry30.length)||(bayyinData.expiry60&&bayyinData.expiry60.length);if(!hasExistingData)document.getElementById("updatesList").innerHTML=`<div class="empty-message"><div><strong>فشل الاتصال بالبيانات</strong><span class="en">${escapeHtml(error.message||error)}</span></div></div>`;console.warn("Bayyin sync failed:",error)}}
function renderUpdateCard(item){const status=item.status||"expected";return`<article class="card" data-status="${escapeHtml(status)}"><div class="icon">${iconForStatus(status)}</div><div class="info"><h3 class="title">${escapeHtml(item.itemAr||item.itemEn||"غير محدد")}</h3><p class="sub en">${escapeHtml(item.itemEn||item.itemAr||"")}</p></div><div class="meta"><strong>${escapeHtml(item.time||"--:--")}</strong><span>${escapeHtml(item.date||"")}</span></div></article>`}
function renderExpiryCard(item,status){return`<article class="card expiry-card" data-status="${status}"><div class="icon">${status==="unavailable"?"×":"!"}</div><div class="info"><h3 class="title">${escapeHtml(item.itemAr||item.itemEn||"غير محدد")}</h3><p class="sub en">${escapeHtml(item.itemEn||item.itemAr||"")}</p></div><div class="meta"><strong>${escapeHtml(item.date||"")}</strong><span>${escapeHtml(item.days!==undefined?item.days+" days":"Expiry")}</span></div></article>`}
function fillSlots(html,count,size){const missing=Math.max(0,size-count);return html+Array.from({length:missing}).map(()=>`<div class="empty-slot"></div>`).join("")}
function animatePageChange(elements,draw){const targets=Array.isArray(elements)?elements:[elements];targets.forEach(el=>{if(el)el.classList.add("page-changing")});setTimeout(()=>{draw();requestAnimationFrame(()=>{targets.forEach(el=>{if(el)el.classList.remove("page-changing")})})},620)}
function renderUpdates(animate=false){const root=document.getElementById("updatesList");const pill=document.getElementById("updatePagePill");const draw=()=>{const updates=bayyinData.updatesToday||[];const pages=chunk(updates,UPDATE_PAGE_SIZE);if(updatePageIndex>=pages.length)updatePageIndex=0;const current=pages[updatePageIndex];if(!current.length){root.innerHTML=`<div class="empty-message"><div><strong>لا توجد تحديثات لهذا اليوم</strong><span class="en">No updates for today</span></div></div>`;pill.textContent="0 / 0";return}const html=current.map(renderUpdateCard).join("");root.innerHTML=fillSlots(html,current.length,UPDATE_PAGE_SIZE);pill.textContent=`${updatePageIndex+1} / ${pages.length}`};if(animate)animatePageChange(root,draw);else draw()}
function renderExpiryList(id,items,status,pageIndex,pillId,label){const root=document.getElementById(id);const pill=document.getElementById(pillId);const list=items||[];const pages=chunk(list,EXPIRY_PAGE_SIZE);if(pageIndex>=pages.length)pageIndex=0;const current=pages[pageIndex];if(!current.length){root.innerHTML=`<div class="empty-message"><div><strong>لا توجد أصناف</strong><span class="en">No items</span></div></div>`;if(pill)pill.textContent=`${label} 0/0`;return}const html=current.map(item=>renderExpiryCard(item,status)).join("");root.innerHTML=fillSlots(html,current.length,EXPIRY_PAGE_SIZE);if(pill)pill.textContent=`${label} ${pageIndex+1}/${pages.length}`}
function renderExpiry(animate=false){const root30=document.getElementById("expiry30"),root60=document.getElementById("expiry60");const draw=()=>{const pages30=chunk(bayyinData.expiry30||[],EXPIRY_PAGE_SIZE),pages60=chunk(bayyinData.expiry60||[],EXPIRY_PAGE_SIZE);if(expiry30PageIndex>=pages30.length)expiry30PageIndex=0;if(expiry60PageIndex>=pages60.length)expiry60PageIndex=0;renderExpiryList("expiry30",bayyinData.expiry30,"unavailable",expiry30PageIndex,"expiry30PagePill","30D");renderExpiryList("expiry60",bayyinData.expiry60,"limited",expiry60PageIndex,"expiry60PagePill","60D")};if(animate)animatePageChange([root30,root60],draw);else draw()}
function renderAll(animate=false){renderUpdates(animate);renderExpiry(animate)}
function startUpdateRotation(){if(updateTimer)clearInterval(updateTimer);updateTimer=setInterval(()=>{const pages=chunk(bayyinData.updatesToday||[],UPDATE_PAGE_SIZE);if(pages.length<=1)return;updatePageIndex=(updatePageIndex+1)%pages.length;renderUpdates(true)},UPDATE_PAGE_EVERY_MS)}
function startExpiryRotation(){if(expiryTimer)clearInterval(expiryTimer);expiryTimer=setInterval(()=>{const pages30=chunk(bayyinData.expiry30||[],EXPIRY_PAGE_SIZE),pages60=chunk(bayyinData.expiry60||[],EXPIRY_PAGE_SIZE);if(pages30.length>1)expiry30PageIndex=(expiry30PageIndex+1)%pages30.length;if(pages60.length>1)expiry60PageIndex=(expiry60PageIndex+1)%pages60.length;renderExpiry(true)},EXPIRY_PAGE_EVERY_MS)}
function updateClock(){const now=new Date();document.getElementById("timePill").textContent=new Intl.DateTimeFormat("en-GB",{hour:"2-digit",minute:"2-digit",hour12:false,timeZone:"Asia/Riyadh"}).format(now);document.getElementById("datePill").textContent=new Intl.DateTimeFormat("en-GB",{day:"2-digit",month:"2-digit",year:"numeric",timeZone:"Asia/Riyadh"}).format(now)}
function init(){updateClock();setInterval(updateClock,60000);renderAll();syncData();setInterval(syncData,SYNC_EVERY_MS);startUpdateRotation();startExpiryRotation()}
init();
</script>
</body>
